metadata:
  movie_name: Aan Milo Sajna
  release_date: 24 December 1970
  director: Mukul Dutt
  producer: Jagdish Kumar
  music_director: Laxmikant Pyarelal
  lyricist: Anand Bakshi
  cast:
  - Rajesh Khanna
  - Asha Parekh
  - Vinod Khanna

commentary_type: short

songs_order:
- Achha To Hum Chalte Hain
- Jawani O Diwani Tu Zindabad
- Tere Kaaran Mere Saajan
- Falak Se Tod Ke Dekho Sitare
- Palat Meri Jaan
- Rang Rang Ke Phool Khile

commentaries:
  Hindi:
    Aan Milo Sajna: |-
      यह एक अमीर विधवा के बेटे और उसके असली वारिस के इर्द-गिर्द बुनी गई पारिवारिक ड्रामा और थ्रिलर फिल्म है.
      कहानी प्यार. धोखे और संपत्ति के लालच के बीच संघर्ष को बखूबी पेश करती है.
      राजेश खन्ना का स्टारडम और लक्ष्मीकांत-प्यारेलाल का संगीत इस फिल्म की सबसे बड़ी खूबी है.
      फिल्म अपने सुपरहिट गानों 'अच्छा तो हम चलते हैं' और 'जवानी ओ दीवानी' के लिए आज भी याद की जाती है.
    songs:
      Achha To Hum Chalte Hain: |-
        किशोर कुमार और लता मंगेशकर का यह एक सदाबहार और चुलबुला विदाई गीत है.
      Jawani O Diwani Tu Zindabad: |-
        किशोर कुमार की आवाज़ में यह एक ऊर्जावान और मस्ती भरा डांस नंबर है.
      Tere Kaaran Mere Saajan: |-
        लता मंगेशकर की आवाज़ में यह एक मधुर और भावुक कर देने वाला प्रेम गीत है.
      Falak Se Tod Ke Dekho Sitare: |-
        मोहम्मद रफ़ी की आवाज़ में यह एक रोमांटिक और दिल जीतने वाला गीत है.
      Palat Meri Jaan: |-
        आशा भोंसले की आवाज़ में यह एक नशीला और थिरकने पर मजबूर कर देने वाला गाना है.
      Rang Rang Ke Phool Khile: |-
        लता मंगेशकर और मोहम्मद रफ़ी की आवाज़ में यह एक सुंदर और रंगीन युगल गीत है.