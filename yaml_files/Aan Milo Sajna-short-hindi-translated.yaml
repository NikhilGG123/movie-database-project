metadata:
  movie_name: Aan Milo Sajna
  release_date: 24 December 1970
  director: Mukul Dutt
  producer: Jagdish Kumar
  music_director: Laxmikant Pyarelal
  lyricist: Anand Bakshi
  cast:
  - Rajesh Khanna
  - Asha Parekh
  - Vinod Khanna
commentary_type: short
songs_order:
- Achha To Hum Chalte Hain
- Jawani O Diwani Tu Zindabad
- Tere Kaaran Mere Saajan
- Falak Se Tod Ke Dekho Sitare
- Palat Meri Jaan
- Rang Rang Ke Phool Khile
commentaries:
  Hindi:
    Aan Milo Sajna: 'यह एक अमीर विधवा के बेटे और उसके असली वारिस के इर्द-गिर्द बुनी
      गई पारिवारिक ड्रामा और थ्रिलर फिल्म है.

      कहानी प्यार. धोखे और संपत्ति के लालच के बीच संघर्ष को बखूबी पेश करती है.

      राजेश खन्ना का स्टारडम और लक्ष्मीकांत-प्यारेलाल का संगीत इस फिल्म की सबसे बड़ी
      खूबी है.

      फिल्म अपने सुपरहिट गानों ''अच्छा तो हम चलते हैं'' और ''जवानी ओ दीवानी'' के लिए
      आज भी याद की जाती है.'
    songs:
      Achha To Hum Chalte Hain: किशोर कुमार और लता मंगेशकर का यह एक सदाबहार और चुलबुला
        विदाई गीत है.
      Jawani O Diwani Tu Zindabad: किशोर कुमार की आवाज़ में यह एक ऊर्जावान और मस्ती
        भरा डांस नंबर है.
      Tere Kaaran Mere Saajan: लता मंगेशकर की आवाज़ में यह एक मधुर और भावुक कर देने
        वाला प्रेम गीत है.
      Falak Se Tod Ke Dekho Sitare: मोहम्मद रफ़ी की आवाज़ में यह एक रोमांटिक और दिल
        जीतने वाला गीत है.
      Palat Meri Jaan: आशा भोंसले की आवाज़ में यह एक नशीला और थिरकने पर मजबूर कर देने
        वाला गाना है.
      Rang Rang Ke Phool Khile: लता मंगेशकर और मोहम्मद रफ़ी की आवाज़ में यह एक सुंदर
        और रंगीन युगल गीत है.
  English:
    Aan Milo Sajna: 'It is a family drama and thriller film woven around the son of
      a wealthy widow and her rightful heir.

      The story beautifully portrays the struggle between love, betrayal, and the
      greed for wealth.

      Rajesh Khanna''s stardom and Laxmikant-Pyarelal''s music are the film''s greatest
      strengths.

      The film is still remembered for its superhit songs "Achha To Hum Chalte Hain"
      and "Jawani O Deewani."'
    songs:
      Achha To Hum Chalte Hain: This is an evergreen and playful farewell song by
        Kishore Kumar and Lata Mangeshkar.
      Jawani O Diwani Tu Zindabad: This is an energetic and fun dance number sung
        by Kishore Kumar.
      Tere Kaaran Mere Saajan: This is a sweet and emotional love song in the voice
        of Lata Mangeshkar.
      Falak Se Tod Ke Dekho Sitare: This is a romantic and heart-warming song sung
        by Mohammed Rafi.
      Palat Meri Jaan: This is an intoxicating and foot-tapping song in the voice
        of Asha Bhosle.
      Rang Rang Ke Phool Khile: This is a beautiful and colourful duet sung by Lata
        Mangeshkar and Mohammed Rafi.
  Marathi:
    Aan Milo Sajna: 'हा एक कौटुंबिक नाट्यमय आणि थ्रिलर चित्रपट आहे जो एका श्रीमंत
      विधवेच्या मुलाभोवती आणि तिच्या हक्काच्या वारसाभोवती गुंफलेला आहे.

      ही कथा प्रेम, विश्वासघात आणि संपत्तीचा लोभ यांच्यातील संघर्षाचे सुंदर चित्रण
      करते.

      राजेश खन्नाचा स्टारडम आणि लक्ष्मीकांत-प्यारेलाल यांचे संगीत ही चित्रपटाची सर्वात
      मोठी ताकद आहे.

      हा चित्रपट अजूनही त्याच्या सुपरहिट गाण्यांसाठी लक्षात ठेवला जातो "अच्छा तो हम
      चलते हैं" आणि "जवानी ओ दिवानी".'
    songs:
      Achha To Hum Chalte Hain: हे किशोर कुमार आणि लता मंगेशकर यांचे एक सदाबहार आणि
        खेळकर निरोपगीत आहे.
      Jawani O Diwani Tu Zindabad: किशोर कुमार यांनी गायलेले हे एक उत्साही आणि मजेदार
        नृत्य क्रमांक आहे.
      Tere Kaaran Mere Saajan: लता मंगेशकर यांच्या आवाजातील हे एक गोड आणि भावनिक प्रेमगीत
        आहे.
      Falak Se Tod Ke Dekho Sitare: हे मोहम्मद रफी यांनी गायलेले एक रोमँटिक आणि हृदयस्पर्शी
        गाणे आहे.
      Palat Meri Jaan: आशा भोसले यांच्या आवाजातील हे एक मादक आणि पायांना स्पर्श करणारे
        गाणे आहे.
      Rang Rang Ke Phool Khile: लता मंगेशकर आणि मोहम्मद रफी यांनी गायलेले हे एक सुंदर
        आणि रंगीत युगलगीत आहे.
  Telugu:
    Aan Milo Sajna: 'ఇది ఒక ధనవంతురాలైన విధవరాలి కుమారుడు మరియు ఆమెకు నిజమైన వారసుడు
      చుట్టూ అల్లిన కుటుంబ నాటకం మరియు థ్రిల్లర్ చిత్రం.


      ప్రేమ, ద్రోహం మరియు సంపద కోసం దురాశ మధ్య పోరాటాన్ని ఈ కథ అందంగా చిత్రీకరిస్తుంది.


      రాజేష్ ఖన్నా స్టార్‌డమ్ మరియు లక్ష్మీకాంత్-ప్యారేలాల్ సంగీతం ఈ చిత్రానికి గొప్ప
      బలాలు.


      ఈ చిత్రం ఇప్పటికీ దాని సూపర్‌హిట్ పాటలైన "అచ్ఛా తో హమ్ చల్తే హై" మరియు "జవానీ
      ఓ దీవానీ" లకు గుర్తుండిపోతుంది.'
    songs:
      Achha To Hum Chalte Hain: ఇది కిషోర్ కుమార్ మరియు లతా మంగేష్కర్ లచే నిత్యనూతనమైన
        మరియు ఉల్లాసభరితమైన వీడ్కోలు పాట.
      Jawani O Diwani Tu Zindabad: ఇది కిషోర్ కుమార్ పాడిన ఉత్సాహభరితమైన మరియు ఆహ్లాదకరమైన
        నృత్య గీతం.
      Tere Kaaran Mere Saajan: ఇది లతా మంగేష్కర్ స్వరంలో ఒక మధురమైన మరియు భావోద్వేగమైన
        ప్రేమ గీతం.
      Falak Se Tod Ke Dekho Sitare: ఇది మహమ్మద్ రఫీ పాడిన ఒక శృంగారభరితమైన మరియు హృదయాన్ని
        కదిలించే పాట.
      Palat Meri Jaan: ఆశా భోంస్లే స్వరంలో మత్తెక్కించే మరియు పాదాలను తట్టే పాట ఇది.
      Rang Rang Ke Phool Khile: ఇది లతా మంగేష్కర్ మరియు మహమ్మద్ రఫీ పాడిన అందమైన మరియు
        రంగుల యుగళగీతం.
  Tamil:
    Aan Milo Sajna: 'இது ஒரு பணக்கார விதவையின் மகனையும் அவளுடைய உண்மையான வாரிசையும்
      சுற்றி பின்னப்பட்ட ஒரு குடும்ப நாடகம் மற்றும் த்ரில்லர் படம்.


      காதல், துரோகம் மற்றும் செல்வத்திற்கான பேராசை ஆகியவற்றுக்கு இடையிலான போராட்டத்தை
      கதை அழகாக சித்தரிக்கிறது.


      ராஜேஷ் கன்னாவின் நட்சத்திர அந்தஸ்தும், லட்சுமிகாந்த்-பியாரேலாலின் இசையும் படத்தின்
      மிகப்பெரிய பலங்கள்.


      இந்த படம் அதன் சூப்பர்ஹிட் பாடல்களான "அச்சா தோ ஹம் சல்தே ஹைன்" மற்றும் "ஜவானி
      ஓ தீவானி" ஆகியவற்றிற்காக இன்னும் நினைவுகூரப்படுகிறது.'
    songs:
      Achha To Hum Chalte Hain: இது கிஷோர் குமார் மற்றும் லதா மங்கேஷ்கரின் பசுமையான
        மற்றும் விளையாட்டுத்தனமான பிரியாவிடை பாடல்.
      Jawani O Diwani Tu Zindabad: இது கிஷோர் குமார் பாடிய ஒரு துடிப்பான மற்றும் வேடிக்கையான
        நடனப் பாடல்.
      Tere Kaaran Mere Saajan: இது லதா மங்கேஷ்கரின் குரலில் இனிமையான மற்றும் உணர்ச்சிபூர்வமான
        காதல் பாடல்.
      Falak Se Tod Ke Dekho Sitare: இது முகமது ரஃபி பாடிய ஒரு காதல் மற்றும் மனதைக்
        கவரும் பாடல்.
      Palat Meri Jaan: இது ஆஷா போஸ்லேவின் குரலில் ஒரு போதையூட்டும் மற்றும் கால்களைத்
        தட்டக்கூடிய பாடல்.
      Rang Rang Ke Phool Khile: இது லதா மங்கேஷ்கரும் முகமது ரஃபியும் பாடிய அழகான மற்றும்
        வண்ணமயமான ஜோடிப் பாடல்.
  Gujarati:
    Aan Milo Sajna: 'આ એક કૌટુંબિક ડ્રામા અને થ્રિલર ફિલ્મ છે જે એક શ્રીમંત વિધવાના
      પુત્ર અને તેના હકદાર વારસદારની આસપાસ વણાયેલી છે.

      આ વાર્તા પ્રેમ, વિશ્વાસઘાત અને સંપત્તિના લોભ વચ્ચેના સંઘર્ષને સુંદર રીતે રજૂ
      કરે છે.

      રાજેશ ખન્નાનું સ્ટારડમ અને લક્ષ્મીકાંત-પ્યારેલાલનું સંગીત ફિલ્મની સૌથી મોટી
      શક્તિ છે.

      આ ફિલ્મ હજુ પણ તેના સુપરહિટ ગીતો "અચ્છા તો હમ ચલતે હૈ" અને "જવાની ઓ દીવાની"
      માટે યાદ કરવામાં આવે છે.'
    songs:
      Achha To Hum Chalte Hain: આ કિશોર કુમાર અને લતા મંગેશકરનું સદાબહાર અને રમતિયાળ
        વિદાય ગીત છે.
      Jawani O Diwani Tu Zindabad: આ કિશોર કુમાર દ્વારા ગાયેલું એક ઉર્જાવાન અને મનોરંજક
        નૃત્ય ગીત છે.
      Tere Kaaran Mere Saajan: લતા મંગેશકરના અવાજમાં આ એક મધુર અને ભાવનાત્મક પ્રેમ
        ગીત છે.
      Falak Se Tod Ke Dekho Sitare: આ એક રોમેન્ટિક અને હૃદયસ્પર્શી ગીત છે જે મોહમ્મદ
        રફીએ ગાયું છે.
      Palat Meri Jaan: આશા ભોંસલેના અવાજમાં આ એક માદક અને પગ થપથપાવી દે તેવું ગીત
        છે.
      Rang Rang Ke Phool Khile: આ લતા મંગેશકર અને મોહમ્મદ રફી દ્વારા ગવાયેલું એક સુંદર
        અને રંગીન યુગલગીત છે.
  Bengali:
    Aan Milo Sajna: 'এটি একটি পারিবারিক নাটক এবং থ্রিলার চলচ্চিত্র যা একজন ধনী বিধবার
      ছেলে এবং তার ন্যায্য উত্তরাধিকারীকে ঘিরে তৈরি।


      গল্পটিতে প্রেম, বিশ্বাসঘাতকতা এবং সম্পদের লোভের মধ্যে লড়াইকে সুন্দরভাবে চিত্রিত
      করা হয়েছে।


      রাজেশ খান্নার তারকাখ্যাতি এবং লক্ষ্মীকান্ত-পেয়ারেলালের সঙ্গীতই এই চলচ্চিত্রের
      সবচেয়ে বড় শক্তি।


      "আচ্ছা তো হাম চালতে হ্যায়" এবং "জওয়ানি ও দিওয়ানি" এর সুপারহিট গানগুলির জন্য
      ছবিটি এখনও স্মরণীয়।'
    songs:
      Achha To Hum Chalte Hain: এটি কিশোর কুমার এবং লতা মঙ্গেশকরের একটি চিরসবুজ এবং
        কৌতুকপূর্ণ বিদায়ী গান।
      Jawani O Diwani Tu Zindabad: এটি কিশোর কুমারের গাওয়া একটি প্রাণবন্ত এবং মজাদার
        নৃত্যসংগীত।
      Tere Kaaran Mere Saajan: এটি লতা মঙ্গেশকরের কণ্ঠে একটি মিষ্টি এবং আবেগঘন প্রেমের
        গান।
      Falak Se Tod Ke Dekho Sitare: এটি মোহাম্মদ রফির গাওয়া একটি রোমান্টিক এবং হৃদয়গ্রাহী
        গান।
      Palat Meri Jaan: আশা ভোঁসলের কণ্ঠে এটি একটি মাতাল এবং পা নাড়ানো গান।
      Rang Rang Ke Phool Khile: এটি লতা মঙ্গেশকর এবং মোহাম্মদ রফির গাওয়া একটি সুন্দর
        এবং রঙিন যুগলবন্দী।
  Arabic:
    Aan Milo Sajna: 'هو فيلم درامي عائلي وتشويقي، تدور أحداثه حول ابن أرملة ثرية ووريثها
      الشرعي.


      يُصوّر الفيلم ببراعة الصراع بين الحب والخيانة والجشع للثروة.

      يُعدّ تألق راجيش خانا وموسيقى لاكسميكانت-بياريلال من أبرز نقاط قوة الفيلم.

      لا يزال الفيلم محفورًا في الذاكرة بأغنيتيه الشهيرتين "أتشا تو هوم تشالت هين"
      و"جواني أو ديواني".'
    songs:
      Achha To Hum Chalte Hain: هذه أغنية وداع خالدة ومرحة من أداء كيشور كومار ولاتا
        مانغيشكار.
      Jawani O Diwani Tu Zindabad: هذه أغنية راقصة مفعمة بالحيوية والمرح يؤديها كيشور
        كومار.
      Tere Kaaran Mere Saajan: هذه أغنية حب عذبة وعاطفية بصوت لاتا مانغيشكار.
      Falak Se Tod Ke Dekho Sitare: هذه أغنية رومانسية ومؤثرة غناها محمد رافي.
      Palat Meri Jaan: هذه أغنية آسرة وممتعة بصوت آشا بهوسلي.
      Rang Rang Ke Phool Khile: هذا دويتو جميل وملون غنته لاتا مانغيشكار ومحمد رافي.
  Korean:
    Aan Milo Sajna: '이 영화는 부유한 미망인의 아들과 그녀의 정당한 상속인을 중심으로 펼쳐지는 가족 드라마이자 스릴러입니다.

      사랑, 배신, 그리고 재물에 대한 탐욕 사이의 갈등을 아름답게 그려냅니다.

      라제시 칸나의 스타덤과 락스미칸트-피아렐랄의 음악은 이 영화의 가장 큰 강점입니다.

      이 영화는 "Achha To Hum Chalte Hain"과 "Jawani O Deewani"와 같은 히트곡으로 여전히 많은 사람들에게
      기억되고 있습니다.'
    songs:
      Achha To Hum Chalte Hain: 이 곡은 키쇼어 쿠마르와 라타 망게슈카르가 부른, 시대를 초월하는 유쾌한 이별 노래입니다.
      Jawani O Diwani Tu Zindabad: 이 곡은 키쇼어 쿠마르가 부른 활기 넘치고 재미있는 댄스곡입니다.
      Tere Kaaran Mere Saajan: 이 곡은 라타 망게슈카르의 목소리로 부르는 감미롭고 감성적인 사랑 노래입니다.
      Falak Se Tod Ke Dekho Sitare: 이 곡은 모하메드 라피가 부른 로맨틱하고 가슴 따뜻한 노래입니다.
      Palat Meri Jaan: 이 곡은 아샤 보슬레의 목소리로 부르는, 듣는 이를 매료시키고 발을 들썩이게 하는 노래입니다.
      Rang Rang Ke Phool Khile: 이 곡은 라타 망게슈카르와 모하메드 라피가 부른 아름답고 다채로운 듀엣곡입니다.
  Russian:
    Aan Milo Sajna: 'Это семейная драма и триллер, сюжет которого вращается вокруг
      сына богатой вдовы и её законного наследника.

      История прекрасно показывает борьбу между любовью, предательством и жадностью
      к богатству.

      Звёздный статус Раджеша Кханны и музыка Лаксмиканта-Пьярелала — главные достоинства
      фильма.

      Фильм до сих пор помнят по его суперхитам «Achha To Hum Chalte Hain» и «Jawani
      O Deewani».'
    songs:
      Achha To Hum Chalte Hain: Это нестареющая и игривая прощальная песня Кишора
        Кумара и Латы Мангешкар.
      Jawani O Diwani Tu Zindabad: Это энергичный и зажигательный танцевальный номер
        в исполнении Кишора Кумара.
      Tere Kaaran Mere Saajan: Это нежная и трогательная песня о любви в исполнении
        Латы Мангешкар.
      Falak Se Tod Ke Dekho Sitare: Это романтическая и трогательная песня в исполнении
        Мохаммеда Рафи.
      Palat Meri Jaan: Это завораживающая и зажигательная песня в исполнении Аши Бхосле.
      Rang Rang Ke Phool Khile: Это прекрасный и красочный дуэт в исполнении Латы
        Мангешкар и Мохаммеда Рафи.
  French:
    Aan Milo Sajna: 'C''est un drame familial à suspense, dont l''intrigue se concentre
      sur le fils d''une riche veuve et son héritier légitime.


      L''histoire dépeint avec finesse la lutte entre l''amour, la trahison et la
      soif de richesse.


      Le charisme de Rajesh Khanna et la musique de Laxmikant-Pyarelal constituent
      les plus grands atouts du film.


      Ce dernier reste célèbre pour ses chansons à succès « Achha To Hum Chalte Hain »
      et « Jawani O Deewani ».'
    songs:
      Achha To Hum Chalte Hain: Il s'agit d'une chanson d'adieu intemporelle et enjouée
        de Kishore Kumar et Lata Mangeshkar.
      Jawani O Diwani Tu Zindabad: Il s'agit d'un morceau de danse énergique et amusant
        interprété par Kishore Kumar.
      Tere Kaaran Mere Saajan: Il s'agit d'une chanson d'amour douce et émouvante
        interprétée par Lata Mangeshkar.
      Falak Se Tod Ke Dekho Sitare: Il s'agit d'une chanson romantique et touchante
        interprétée par Mohammed Rafi.
      Palat Meri Jaan: Il s'agit d'une chanson entraînante et irrésistible interprétée
        par Asha Bhosle.
      Rang Rang Ke Phool Khile: Il s'agit d'un magnifique duo coloré interprété par
        Lata Mangeshkar et Mohammed Rafi.
  Punjabi:
    Aan Milo Sajna: 'ਇਹ ਇੱਕ ਪਰਿਵਾਰਕ ਡਰਾਮਾ ਅਤੇ ਥ੍ਰਿਲਰ ਫਿਲਮ ਹੈ ਜੋ ਇੱਕ ਅਮੀਰ ਵਿਧਵਾ ਦੇ
      ਪੁੱਤਰ ਅਤੇ ਉਸਦੇ ਸਹੀ ਵਾਰਸ ਦੇ ਆਲੇ-ਦੁਆਲੇ ਬੁਣੀ ਗਈ ਹੈ।


      ਇਹ ਕਹਾਣੀ ਪਿਆਰ, ਵਿਸ਼ਵਾਸਘਾਤ ਅਤੇ ਦੌਲਤ ਦੇ ਲਾਲਚ ਵਿਚਕਾਰ ਸੰਘਰਸ਼ ਨੂੰ ਖੂਬਸੂਰਤੀ ਨਾਲ ਦਰਸਾਉਂਦੀ
      ਹੈ।


      ਰਾਜੇਸ਼ ਖੰਨਾ ਦਾ ਸਟਾਰਡਮ ਅਤੇ ਲਕਸ਼ਮੀਕਾਂਤ-ਪਿਆਰੇਲਾਲ ਦਾ ਸੰਗੀਤ ਫਿਲਮ ਦੀਆਂ ਸਭ ਤੋਂ ਵੱਡੀਆਂ
      ਤਾਕਤਾਂ ਹਨ।


      ਫਿਲਮ ਨੂੰ ਅਜੇ ਵੀ ਇਸਦੇ ਸੁਪਰਹਿੱਟ ਗੀਤਾਂ "ਅੱਛਾ ਤੋ ਹਮ ਚਲਤੇ ਹੈਂ" ਅਤੇ "ਜਵਾਨੀ ਓ ਦੀਵਾਨੀ"
      ਲਈ ਯਾਦ ਕੀਤਾ ਜਾਂਦਾ ਹੈ।'
    songs:
      Achha To Hum Chalte Hain: ਇਹ ਕਿਸ਼ੋਰ ਕੁਮਾਰ ਅਤੇ ਲਤਾ ਮੰਗੇਸ਼ਕਰ ਦਾ ਇੱਕ ਸਦਾਬਹਾਰ ਅਤੇ
        ਮਜ਼ੇਦਾਰ ਵਿਦਾਇਗੀ ਗੀਤ ਹੈ।
      Jawani O Diwani Tu Zindabad: ਇਹ ਕਿਸ਼ੋਰ ਕੁਮਾਰ ਦੁਆਰਾ ਗਾਇਆ ਗਿਆ ਇੱਕ ਊਰਜਾਵਾਨ ਅਤੇ
        ਮਜ਼ੇਦਾਰ ਡਾਂਸ ਨੰਬਰ ਹੈ।
      Tere Kaaran Mere Saajan: ਇਹ ਲਤਾ ਮੰਗੇਸ਼ਕਰ ਦੀ ਆਵਾਜ਼ ਵਿੱਚ ਇੱਕ ਮਿੱਠਾ ਅਤੇ ਭਾਵੁਕ ਪ੍ਰੇਮ
        ਗੀਤ ਹੈ।
      Falak Se Tod Ke Dekho Sitare: ਇਹ ਮੁਹੰਮਦ ਰਫੀ ਦੁਆਰਾ ਗਾਇਆ ਗਿਆ ਇੱਕ ਰੋਮਾਂਟਿਕ ਅਤੇ
        ਦਿਲ ਨੂੰ ਛੂਹ ਲੈਣ ਵਾਲਾ ਗੀਤ ਹੈ।
      Palat Meri Jaan: ਇਹ ਆਸ਼ਾ ਭੋਂਸਲੇ ਦੀ ਆਵਾਜ਼ ਵਿੱਚ ਇੱਕ ਨਸ਼ੀਲਾ ਅਤੇ ਪੈਰ ਥਪਥਪਾਉਂਦਾ ਗੀਤ
        ਹੈ।
      Rang Rang Ke Phool Khile: ਇਹ ਲਤਾ ਮੰਗੇਸ਼ਕਰ ਅਤੇ ਮੁਹੰਮਦ ਰਫੀ ਦੁਆਰਾ ਗਾਇਆ ਗਿਆ ਇੱਕ
        ਸੁੰਦਰ ਅਤੇ ਰੰਗੀਨ ਜੋੜੀ ਹੈ।
  German:
    Aan Milo Sajna: 'Es handelt sich um ein Familiendrama mit Thriller-Elementen,
      das sich um den Sohn einer wohlhabenden Witwe und ihren rechtmäßigen Erben dreht.

      Die Geschichte schildert eindrücklich den Konflikt zwischen Liebe, Verrat und
      der Gier nach Reichtum. Rajesh Khannas Starruhm und die Musik von Laxmikant-Pyarelal
      sind die größten Stärken des Films.

      Der Film ist bis heute für seine Superhits „Achha To Hum Chalte Hain“ und „Jawani
      O Deewani“ bekannt.'
    songs:
      Achha To Hum Chalte Hain: Dies ist ein zeitloser und beschwingter Abschiedssong
        von Kishore Kumar und Lata Mangeshkar.
      Jawani O Diwani Tu Zindabad: Dies ist ein energiegeladenes und mitreißendes
        Tanzlied, gesungen von Kishore Kumar.
      Tere Kaaran Mere Saajan: Dies ist ein süßes und gefühlvolles Liebeslied, gesungen
        von Lata Mangeshkar.
      Falak Se Tod Ke Dekho Sitare: Dies ist ein romantisches und herzerwärmendes
        Lied, gesungen von Mohammed Rafi.
      Palat Meri Jaan: Dies ist ein mitreißender und zum Mitwippen animierter Song,
        gesungen von Asha Bhosle.
      Rang Rang Ke Phool Khile: Dies ist ein wunderschönes und farbenfrohes Duett,
        gesungen von Lata Mangeshkar und Mohammed Rafi.
  Mandarin:
    Aan Milo Sajna: '这是一部以富裕寡妇之子及其合法继承人为主角的家庭剧情惊悚片。


      影片细腻地刻画了爱情、背叛和对财富的贪婪之间的挣扎。


      拉杰什·卡纳的明星光环和拉克什米坎特-皮亚雷拉尔的配乐是这部电影最大的亮点。


      影片中的热门歌曲《Achha To Hum Chalte Hain》和《Jawani O Deewani》至今仍为人津津乐道。'
    songs:
      Achha To Hum Chalte Hain: 这是一首由基肖尔·库马尔和拉塔·曼格什卡演唱的经久不衰、轻松愉快的告别歌曲。
      Jawani O Diwani Tu Zindabad: 这是一首由基肖尔·库马尔演唱的充满活力、趣味十足的舞曲。
      Tere Kaaran Mere Saajan: 这是一首由拉塔·曼格什卡演唱的甜蜜动人的情歌。
      Falak Se Tod Ke Dekho Sitare: 这是一首由穆罕默德·拉菲演唱的浪漫温馨的歌曲。
      Palat Meri Jaan: 这是一首由阿莎·博斯勒演唱的令人陶醉、节奏欢快的歌曲。
      Rang Rang Ke Phool Khile: 这是一首由拉塔·曼格什卡尔和穆罕默德·拉菲演唱的优美动听的二重唱。
