metadata:
  movie_name: Aan Milo Sajna
  release_date: 24 December 1970
  director: Mukul Dutt
  producer: Jagdish Kumar
  music_director: Laxmikant Pyarelal
  lyricist: Anand Bakshi
  cast:
  - Rajesh Khanna
  - Asha Parekh
  - Vinod Khanna

commentary_type: long

songs_order:
- Achha To Hum Chalte Hain
- Jawani O Diwani Tu Zindabad
- Tere Kaaran Mere Saajan
- Falak Se Tod Ke Dekho Sitare
- Palat Meri Jaan
- Rang Rang Ke Phool Khile

commentaries:
  Hindi:
    Aan Milo Sajna: |-
      कहानी अनिल यानी राजेश खन्ना के इर्द-गिर्द घूमती है. जो अपनी माँ निरूपा रॉय का इकलौता वारिस है.
      संपत्ति के लालच में अनिल का चचेरा भाई अनिल के खिलाफ साज़िश रचता है. जिससे अनिल को घर छोड़ना पड़ता है.
      अपनी पहचान छिपाकर अनिल एक अलग शहर पहुँचता है. जहाँ उसकी मुलाकात दीपा यानी आशा पारेख से होती है.
      दीपा और अनिल के बीच प्यार पनपता है. लेकिन अतीत की परछाइयाँ उनका पीछा नहीं छोड़तीं.
      अनिल को न केवल अपना प्यार पाना है. बल्कि अपनी माँ को धोखेबाजों के चंगुल से भी आज़ाद कराना है.
      राजेश खन्ना का रोमांटिक अंदाज़ और विनोद खन्ना की दमदार उपस्थिति फिल्म को एक बेहतरीन कमर्शियल ड्रामा बनाती है.

    songs:
      Achha To Hum Chalte Hain: |-
        यह गीत प्रेमी जोड़े के बीच की मीठी नोक-झोंक और विदाई के पल को बहुत ही मासूमियत से पेश करता है.
        किशोर कुमार और लता मंगेशकर की जुगलबंदी ने इसे एक कल्ट क्लासिक बना दिया है.

      Jawani O Diwani Tu Zindabad: |-
        राजेश खन्ना के सिग्नेचर स्टाइल और किशोर कुमार की जादुई आवाज़ ने इस गीत को युवाओं का एंथम बना दिया था.
        गीत की ताल और बोल जीवन के प्रति उत्साह और जोश को दर्शाते हैं.

      Tere Kaaran Mere Saajan: |-
        यह एक विरह और समर्पण का गीत है. जहाँ नायिका अपने साजन के प्रति अपनी गहरी संवेदनाएं व्यक्त करती है.
        लता जी की गायकी ने इसमें एक रूहानी दर्द भर दिया है.

      Falak Se Tod Ke Dekho Sitare: |-
        मोहम्मद रफ़ी की रेशमी आवाज़ इस गीत में रोमांस की एक नई परिभाषा गढ़ती है.
        यह नायक द्वारा अपनी प्रेमिका को मनाने और अपने अटूट प्रेम का वादा करने का एक बेहतरीन चित्रण है.