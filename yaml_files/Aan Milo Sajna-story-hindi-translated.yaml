metadata:
  movie_name: Aan Milo Sajna
  release_date: 24 December 1970
  director: Mukul Dutt
  producer: Jagdish Kumar
  music_director: Laxmikant Pyarelal
  lyricist: Anand Bakshi
  cast:
  - Rajesh Khanna
  - Asha Parekh
  - Vinod Khanna
commentary_type: story
songs_order:
- Achha To Hum Chalte Hain
- Jawani O Diwani Tu Zindabad
- Tere Kaaran Mere Saajan
- Falak Se Tod Ke Dekho Sitare
- Palat Meri Jaan
- Rang Rang Ke Phool Khile
commentaries:
  Hindi:
    Aan Milo Sajna: 'अनिल की कहानी एक ऐसी माँ की प्रतीक्षा से शुरू होती है जिसका इकलौता
      बेटा बरसों पहले बिछड़ गया था.

      अमीर विधवा सावित्री देवी को धोखे से विश्वास दिलाया जाता है कि एक अजनबी ही उनका
      असली बेटा अनिल है.

      असली अनिल यानी राजेश खन्ना अपनी पहचान छिपाकर एक साधारण जीवन जी रहा है.

      उसका सामना दीपा यानी आशा पारेख से होता है. जो अपनी सादगी और सुंदरता से अनिल
      का दिल जीत लेती है.


      जैसे-जैसे अनिल और दीपा का रिश्ता गहरा होता है. वैसे-वैसे संपत्ति के भूखे शिकारियों
      का जाल भी बिछने लगता है.

      अनिल को अहसास होता है कि उसकी माँ की जान और सम्मान खतरे में है.

      धोखेबाजों का गिरोह. जिसका नेतृत्व अपराधी प्रवृत्ति के लोग कर रहे हैं. सावित्री
      देवी को पूरी तरह से नियंत्रित करना चाहता है.

      अनिल अपनी माँ के पास वापस पहुँचने और उस फर्जी बेटे का पर्दाफाश करने के लिए एक
      जोखिम भरी योजना बनाता है.


      सच्चाई और लालच के बीच इस जंग में दीपा अनिल की सबसे बड़ी ताकत बनकर उभरती है.

      गहन रहस्य और रोमांचक मोड़ों से गुज़रते हुए अनिल अंततः अपने परिवार की खोई हुई गरिमा
      को बहाल करता है.

      अहंकार और छल की हार होती है. और एक बिखरा हुआ परिवार फिर से एक हो जाता है.

      यह सफर हमें सिखाता है कि खून के रिश्तों और सच्चाई को ज्यादा समय तक अंधेरे में
      नहीं रखा जा सकता.'
    Achha To Hum Chalte Hain: 'प्रेमी युगल के बीच की मीठी तकरार और जुदा होने की कसमसाहट
      इस गीत को एक जीवंत रंग देती है.

      सूरज ढलने के साथ नायक और नायिका एक-दूसरे को विदा तो करते हैं. लेकिन उनके कदम
      रुक जाने को बेताब हैं.

      किशोर कुमार और लता मंगेशकर के सुरों ने इस नोक-झोंक को प्रेम की एक अमर कविता
      में बदल दिया है.

      यह गीत हर उस प्रेमी के दिल की आवाज़ है जो अपने साथी से एक पल भी दूर नहीं होना
      चाहता.'
    Jawani O Diwani Tu Zindabad: 'मस्ती और बेफिक्री से लबरेज यह गीत जवानी के जोश और
      जीवन के उत्सव का एक प्रतीक है.

      राजेश खन्ना के करिश्माई अंदाज़ ने इस धुन को हर जुबान पर चढ़ा दिया था.

      यह नायक की आज़ाद ख्याली और उसके जिंदादिल व्यक्तित्व को पूरी तरह से परिभाषित करता
      है.

      संगीत की तेज़ लहरें श्रोताओं को एक अलग ही ऊर्जा से भर देती हैं.'
    Tere Kaaran Mere Saajan: 'यह गीत समर्पण की पराकाष्ठा है. जहाँ नायिका अपने जीवन
      का हर रंग अपने साजन के नाम कर देती है.

      लता जी की कोमल आवाज़ इस धुन को रूहानी गहराई प्रदान करती है.

      यह प्रेम के उस पवित्र बंधन को दर्शाता है जहाँ दूरी होने के बावजूद दिल जुड़े रहते
      हैं.

      गीत के बोल साजन के प्रति एक अंतहीन प्रतीक्षा और अटूट विश्वास को बयां करते हैं.'
    Falak Se Tod Ke Dekho Sitare: 'मोहम्मद रफ़ी की मखमली आवाज़ इस रोमांटिक गीत को एक
      अलग ही ऊंचाई पर ले जाती है.

      नायक अपनी प्रेमिका के लिए चाँद-तारे तोड़ लाने का जो वादा करता है. वह प्रेम की
      जादुई दुनिया का द्वार खोल देता है.

      यह एक ऐसा मधुर संवाद है जो शब्दों से ज्यादा भावनाओं के जरिए दिल तक पहुँचता है.

      प्रेम के इजहार का यह तरीका आज भी उतना ही प्रभावशाली और नया महसूस होता है.'
    Palat Meri Jaan: 'आशा भोंसले की चंचल गायकी इस गीत में एक अलग ही नशा और आकर्षण
      पैदा करती है.

      यह गीत नायिका के मोहक अंदाज़ और नायक को अपनी ओर आकर्षित करने की कला का सुंदर
      चित्रण है.

      संगीत की ताल इतनी सम्मोहक है कि सुनने वाला खुद-ब-खुद इसकी लय में खो जाता है.

      यह कहानी के उस मोड़ को दर्शाता है जहाँ आकर्षण और चंचलता अपने चरम पर होती है.'
    Rang Rang Ke Phool Khile: 'प्रकृति के सुंदर नज़ारों और फूलों की महक के बीच यह युगल
      गीत प्रेम के विविध रंगों को समेटे हुए है.

      रफ़ी साहब और लता जी की आवाज़ों का संगम इस गीत को एक मधुर वसंत की तरह महसूस कराता
      है.

      यह नायक और नायिका के सुखद मिलन और उनकी खुशहाल दुनिया का एक सुरीला जश्न है.

      गीत के बोल और धुन मन में एक सकारात्मक और शांतिपूर्ण वातावरण का निर्माण करते
      हैं.'
  English:
    Aan Milo Sajna: 'Anil''s story begins with the longing for a mother who lost her
      only son years ago.

      A wealthy widow, Savitri Devi, is deceived into believing that a stranger is
      her real son, Anil.

      The real Anil, played by Rajesh Khanna, is living a simple life, concealing
      his identity.

      He encounters Deepa, played by Asha Parekh, who wins Anil''s heart with her
      simplicity and beauty.


      As Anil and Deepa''s relationship deepens, so too does the web of wealth-hungry
      predators.

      Anil realizes that his mother''s life and honor are in danger.

      A gang of fraudsters, led by criminal individuals, seeks complete control of
      Savitri Devi.

      Anil devises a risky plan to return to his mother and expose the fake son.


      In this battle between truth and greed, Deepa emerges as Anil''s greatest strength.

      Navigating intense mystery and thrilling twists, Anil ultimately restores his
      family''s lost dignity.

      Ego and deceit are defeated, and a fractured family is reunited.

      This journey teaches us that blood ties and truth cannot be kept hidden for
      long.'
    Achha To Hum Chalte Hain: 'The sweet banter between the lovers and the agony of
      separation give this song a vibrant color.

      As the sun sets, the hero and heroine bid farewell to each other, but their
      steps are desperate to stop.

      The voices of Kishore Kumar and Lata Mangeshkar transform this banter into an
      immortal poem of love.

      This song speaks to the heart of every lover who doesn''t want to be away from
      their partner even for a moment.'
    Jawani O Diwani Tu Zindabad: 'Filled with fun and carefree spirit, this song embodies
      the exuberance of youth and the celebration of life.

      Rajesh Khanna''s charismatic style made this tune a household name.

      It perfectly defines the hero''s free-spirited spirit and vivacious personality.

      The vibrant waves of the music fill listeners with a unique energy.'
    Tere Kaaran Mere Saajan: 'This song is the pinnacle of devotion, where the heroine
      dedicates every aspect of her life to her beloved.


      Lata ji''s soft voice lends a spiritual depth to this melody.


      It depicts the sacred bond of love where hearts remain connected despite distance.


      The lyrics express an endless wait and unwavering faith in the beloved.'
    Falak Se Tod Ke Dekho Sitare: 'Mohammed Rafi''s velvety voice elevates this romantic
      song to a different level.

      The hero''s promise to bring the moon and stars for his beloved opens the door
      to a magical world of love.

      It''s a sweet dialogue that reaches the heart through emotions more than words.

      This way of expressing love feels just as powerful and fresh even today.'
    Palat Meri Jaan: 'Asha Bhosle''s playful singing creates a unique intoxication
      and charm in this song.

      This song beautifully depicts the heroine''s seductive style and her ability
      to attract the hero.

      The music''s rhythm is so captivating that the listener is automatically lost
      in its rhythm.

      It depicts a turning point in the story where attraction and playfulness reach
      their peak.'
    Rang Rang Ke Phool Khile: 'Set amidst the beautiful scenery of nature and the
      fragrance of flowers, this duet captures the diverse shades of love.


      The blend of Rafi Sahab and Lata Ji''s voices gives this song a sweet spring
      feel.


      It is a melodious celebration of the hero and heroine''s happy union and their
      happy world.


      The song''s lyrics and melody create a positive and peaceful atmosphere in the
      mind.'
    songs: {}
  Marathi:
    Aan Milo Sajna: 'अनिलची कहाणी एका आईच्या उत्कंठेने सुरू होते जिने वर्षानुवर्षे
      तिचा एकुलता एक मुलगा गमावला होता.


      एक श्रीमंत विधवा, सावित्री देवी, एक अनोळखी व्यक्ती तिचा खरा मुलगा अनिल आहे असे
      मानण्यास फसते.


      राजेश खन्ना यांनी साकारलेला खरा अनिल, एक साधे जीवन जगत आहे, त्याची ओळख लपवत
      आहे.


      त्याची भेट आशा पारेख यांनी साकारलेल्या दीपाशी होते, जी तिच्या साधेपणा आणि सौंदर्याने
      अनिलचे मन जिंकते.


      अनिल आणि दीपाचे नाते जसजसे गहिरे होत जाते तसतसे संपत्तीच्या लोभी शिकारींचे जाळे
      देखील वाढते.


      अनिलला कळते की त्याच्या आईचे जीवन आणि सन्मान धोक्यात आहे.


      गुन्हेगार व्यक्तींच्या नेतृत्वाखाली फसवणूक करणाऱ्यांची एक टोळी सावित्री देवींवर
      पूर्ण नियंत्रण मिळवण्याचा प्रयत्न करते.


      अनिल त्याच्या आईकडे परतण्यासाठी आणि बनावट मुलाला उघड करण्यासाठी एक धोकादायक
      योजना आखतो.


      सत्य आणि लोभ यांच्यातील या लढाईत, दीपा अनिलची सर्वात मोठी ताकद म्हणून उदयास
      येते.


      गहन गूढता आणि रोमांचक वळणांमधून, अनिल शेवटी त्याच्या कुटुंबाची हरवलेली प्रतिष्ठा
      परत मिळवतो.


      अहंकार आणि कपट यांचा पराभव होतो आणि तुटलेले कुटुंब पुन्हा एकत्र येते.

      हा प्रवास आपल्याला शिकवतो की रक्ताचे नाते आणि सत्य जास्त काळ लपून राहू शकत नाही.'
    Achha To Hum Chalte Hain: 'प्रेमींमधील गोड गप्पा आणि वियोगाच्या वेदना या गाण्याला
      एक जिवंत रंग देतात.

      सूर्य मावळताच, नायक आणि नायिका एकमेकांना निरोप देतात, परंतु त्यांची पावले थांबण्यास
      उत्सुक असतात.

      किशोर कुमार आणि लता मंगेशकर यांचे आवाज या गप्पांना प्रेमाच्या अमर कवितेत रूपांतरित
      करतात.

      हे गाणे प्रत्येक प्रियकराच्या हृदयाशी बोलते जो आपल्या जोडीदारापासून क्षणभरही
      दूर राहू इच्छित नाही.'
    Jawani O Diwani Tu Zindabad: 'मौजमजेने आणि निश्चिंत भावनेने भरलेले हे गाणे तारुण्याचा
      उत्साह आणि जीवनाचा उत्सव यांचे प्रतीक आहे.


      राजेश खन्नाच्या करिष्माई शैलीने हे गाणे घराघरात लोकप्रिय झाले.


      हे गाणे नायकाच्या मुक्त उत्साही भावनेचे आणि उत्साही व्यक्तिमत्त्वाचे उत्तम वर्णन
      करते.


      संगीताच्या उत्साही लाटा श्रोत्यांना एका अनोख्या उर्जेने भरतात.'
    Tere Kaaran Mere Saajan: 'हे गाणे भक्तीचे शिखर आहे, जिथे नायिका तिच्या आयुष्यातील
      प्रत्येक पैलू तिच्या प्रियकराला समर्पित करते.


      लताजींचा मृदू आवाज या सुरात आध्यात्मिक खोली भरतो.


      हे प्रेमाच्या पवित्र बंधनाचे चित्रण करते जिथे अंतर असूनही हृदये जोडलेली राहतात.


      हे गाणे अंतहीन प्रतीक्षा आणि प्रियकरावरील अढळ विश्वास व्यक्त करते.'
    Falak Se Tod Ke Dekho Sitare: 'मोहम्मद रफीचा मखमली आवाज या रोमँटिक गाण्याला एका
      वेगळ्याच पातळीवर नेतो.


      प्रेयसीसाठी चंद्र आणि तारे आणण्याचे नायकाचे वचन प्रेमाच्या जादुई जगात प्रवेश
      करते.


      हा एक गोड संवाद आहे जो शब्दांपेक्षा भावनांद्वारे हृदयापर्यंत पोहोचतो.


      प्रेम व्यक्त करण्याची ही पद्धत आजही तितकीच शक्तिशाली आणि ताजी वाटते.'
    Palat Meri Jaan: 'आशा भोसले यांचे खेळकर गायन या गाण्यात एक अनोखे मादकता आणि आकर्षण
      निर्माण करते.


      हे गाणे नायिकेची मोहक शैली आणि नायकाला आकर्षित करण्याची तिची क्षमता सुंदरपणे
      दर्शवते.


      संगीताची लय इतकी मनमोहक आहे की श्रोता आपोआप त्याच्या लयीत हरवून जातो.


      हे कथेतील एका वळणाचे चित्रण करते जिथे आकर्षण आणि खेळकरपणा त्यांच्या शिखरावर
      पोहोचतो.'
    Rang Rang Ke Phool Khile: 'निसर्गाच्या सुंदर दृश्यांमध्ये आणि फुलांच्या सुगंधात
      वसलेले हे युगलगीत प्रेमाच्या विविध छटा दाखवते.


      रफी साहेब आणि लताजींच्या आवाजाचे मिश्रण या गाण्याला वसंत ऋतूची गोड अनुभूती देते.


      हे नायक आणि नायिकेच्या आनंदी मिलनाचा आणि त्यांच्या आनंदी जगाचा एक मधुर उत्सव
      आहे.


      गाण्याचे बोल आणि सुर मनात एक सकारात्मक आणि शांत वातावरण निर्माण करतात.'
