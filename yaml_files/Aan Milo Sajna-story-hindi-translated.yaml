  Punjabi:
    Aan Milo Sajna: 'ਅਨਿਲ ਦੀ ਕਹਾਣੀ ਇੱਕ ਮਾਂ ਦੀ ਤਾਂਘ ਨਾਲ ਸ਼ੁਰੂ ਹੁੰਦੀ ਹੈ ਜਿਸਨੇ ਕਈ ਸਾਲ
      ਪਹਿਲਾਂ ਆਪਣੇ ਇਕਲੌਤੇ ਪੁੱਤਰ ਨੂੰ ਗੁਆ ਦਿੱਤਾ ਸੀ।


      ਇੱਕ ਅਮੀਰ ਵਿਧਵਾ, ਸਾਵਿਤਰੀ ਦੇਵੀ, ਇਹ ਵਿਸ਼ਵਾਸ ਕਰਨ ਵਿੱਚ ਧੋਖਾ ਖਾ ਜਾਂਦੀ ਹੈ ਕਿ ਇੱਕ ਅਜਨਬੀ
      ਉਸਦਾ ਅਸਲੀ ਪੁੱਤਰ, ਅਨਿਲ ਹੈ।


      ਰਾਜੇਸ਼ ਖੰਨਾ ਦੁਆਰਾ ਨਿਭਾਇਆ ਗਿਆ ਅਸਲੀ ਅਨਿਲ, ਇੱਕ ਸਾਦਾ ਜੀਵਨ ਜੀ ਰਿਹਾ ਹੈ, ਆਪਣੀ ਪਛਾਣ
      ਲੁਕਾਉਂਦਾ ਹੈ।


      ਉਸਦਾ ਸਾਹਮਣਾ ਆਸ਼ਾ ਪਾਰੇਖ ਦੁਆਰਾ ਨਿਭਾਇਆ ਗਿਆ ਦੀਪਾ ਨਾਲ ਹੁੰਦਾ ਹੈ, ਜੋ ਆਪਣੀ ਸਾਦਗੀ ਅਤੇ
      ਸੁੰਦਰਤਾ ਨਾਲ ਅਨਿਲ ਦਾ ਦਿਲ ਜਿੱਤ ਲੈਂਦੀ ਹੈ।


      ਜਿਵੇਂ-ਜਿਵੇਂ ਅਨਿਲ ਅਤੇ ਦੀਪਾ ਦਾ ਰਿਸ਼ਤਾ ਡੂੰਘਾ ਹੁੰਦਾ ਜਾਂਦਾ ਹੈ, ਉਵੇਂ-ਉਵੇਂ ਦੌਲਤ ਦੇ
      ਭੁੱਖੇ ਸ਼ਿਕਾਰੀਆਂ ਦਾ ਜਾਲ ਵੀ ਫੈਲਦਾ ਜਾਂਦਾ ਹੈ।


      ਅਨਿਲ ਨੂੰ ਅਹਿਸਾਸ ਹੁੰਦਾ ਹੈ ਕਿ ਉਸਦੀ ਮਾਂ ਦੀ ਜਾਨ ਅਤੇ ਇੱਜ਼ਤ ਖ਼ਤਰੇ ਵਿੱਚ ਹੈ।


      ਅਪਰਾਧਿਕ ਵਿਅਕਤੀਆਂ ਦੀ ਅਗਵਾਈ ਵਿੱਚ ਧੋਖੇਬਾਜ਼ਾਂ ਦਾ ਇੱਕ ਗਿਰੋਹ, ਸਾਵਿਤਰੀ ਦੇਵੀ ''ਤੇ ਪੂਰਾ
      ਕੰਟਰੋਲ ਚਾਹੁੰਦਾ ਹੈ।


      ਅਨਿਲ ਆਪਣੀ ਮਾਂ ਕੋਲ ਵਾਪਸ ਜਾਣ ਅਤੇ ਨਕਲੀ ਪੁੱਤਰ ਦਾ ਪਰਦਾਫਾਸ਼ ਕਰਨ ਲਈ ਇੱਕ ਜੋਖਮ ਭਰੀ ਯੋਜਨਾ
      ਬਣਾਉਂਦਾ ਹੈ।


      ਸੱਚ ਅਤੇ ਲਾਲਚ ਵਿਚਕਾਰ ਇਸ ਲੜਾਈ ਵਿੱਚ, ਦੀਪਾ ਅਨਿਲ ਦੀ ਸਭ ਤੋਂ ਵੱਡੀ ਤਾਕਤ ਵਜੋਂ ਉੱਭਰਦਾ
      ਹੈ।


      ਗੰਭੀਰ ਰਹੱਸ ਅਤੇ ਰੋਮਾਂਚਕ ਮੋੜਾਂ ਵਿੱਚੋਂ ਲੰਘਦੇ ਹੋਏ, ਅਨਿਲ ਅੰਤ ਵਿੱਚ ਆਪਣੇ ਪਰਿਵਾਰ ਦੀ
      ਗੁਆਚੀ ਹੋਈ ਇੱਜ਼ਤ ਨੂੰ ਬਹਾਲ ਕਰਦਾ ਹੈ।


      ਹੰਕਾਰ ਅਤੇ ਧੋਖੇ ਦੀ ਹਾਰ ਹੋ ਜਾਂਦੀ ਹੈ, ਅਤੇ ਇੱਕ ਟੁੱਟਿਆ ਹੋਇਆ ਪਰਿਵਾਰ ਦੁਬਾਰਾ ਮਿਲ ਜਾਂਦਾ
      ਹੈ।

      ਇਹ ਯਾਤਰਾ ਸਾਨੂੰ ਸਿਖਾਉਂਦੀ ਹੈ ਕਿ ਖੂਨ ਦੇ ਰਿਸ਼ਤਿਆਂ ਅਤੇ ਸੱਚ ਨੂੰ ਜ਼ਿਆਦਾ ਦੇਰ ਤੱਕ ਲੁਕਾਇਆ
      ਨਹੀਂ ਜਾ ਸਕਦਾ।'
    Achha To Hum Chalte Hain: 'ਪ੍ਰੇਮੀਆਂ ਵਿਚਕਾਰ ਮਿੱਠੀ ਮਜ਼ਾਕ ਅਤੇ ਵਿਛੋੜੇ ਦੀ ਪੀੜ ਇਸ ਗੀਤ
      ਨੂੰ ਇੱਕ ਜੀਵੰਤ ਰੰਗ ਦਿੰਦੀ ਹੈ।

      ਜਿਵੇਂ ਹੀ ਸੂਰਜ ਡੁੱਬਦਾ ਹੈ, ਨਾਇਕ ਅਤੇ ਨਾਇਕਾ ਇੱਕ ਦੂਜੇ ਨੂੰ ਅਲਵਿਦਾ ਕਹਿ ਜਾਂਦੇ ਹਨ, ਪਰ
      ਉਨ੍ਹਾਂ ਦੇ ਕਦਮ ਰੁਕਣ ਲਈ ਬੇਤਾਬ ਹਨ।

      ਕਿਸ਼ੋਰ ਕੁਮਾਰ ਅਤੇ ਲਤਾ ਮੰਗੇਸ਼ਕਰ ਦੀਆਂ ਆਵਾਜ਼ਾਂ ਇਸ ਮਜ਼ਾਕ ਨੂੰ ਪਿਆਰ ਦੀ ਇੱਕ ਅਮਰ ਕਵਿਤਾ
      ਵਿੱਚ ਬਦਲ ਦਿੰਦੀਆਂ ਹਨ।

      ਇਹ ਗੀਤ ਹਰ ਉਸ ਪ੍ਰੇਮੀ ਦੇ ਦਿਲ ਦੀ ਗੱਲ ਕਰਦਾ ਹੈ ਜੋ ਆਪਣੇ ਸਾਥੀ ਤੋਂ ਇੱਕ ਪਲ ਲਈ ਵੀ ਦੂਰ
      ਨਹੀਂ ਰਹਿਣਾ ਚਾਹੁੰਦਾ।'
    Jawani O Diwani Tu Zindabad: 'ਮੌਜ-ਮਸਤੀ ਅਤੇ ਬੇਫਿਕਰ ਭਾਵਨਾ ਨਾਲ ਭਰਿਆ ਇਹ ਗੀਤ ਜਵਾਨੀ
      ਦੇ ਜੋਸ਼ ਅਤੇ ਜ਼ਿੰਦਗੀ ਦੇ ਜਸ਼ਨ ਨੂੰ ਦਰਸਾਉਂਦਾ ਹੈ।


      ਰਾਜੇਸ਼ ਖੰਨਾ ਦੇ ਕਰਿਸ਼ਮਈ ਸ਼ੈਲੀ ਨੇ ਇਸ ਧੁਨ ਨੂੰ ਘਰ-ਘਰ ਵਿੱਚ ਪ੍ਰਸਿੱਧੀ ਦਿਵਾਈ।


      ਇਹ ਨਾਇਕ ਦੀ ਆਜ਼ਾਦ ਭਾਵਨਾ ਅਤੇ ਜੋਸ਼ੀਲੀ ਸ਼ਖਸੀਅਤ ਨੂੰ ਪੂਰੀ ਤਰ੍ਹਾਂ ਪਰਿਭਾਸ਼ਿਤ ਕਰਦਾ ਹੈ।


      ਸੰਗੀਤ ਦੀਆਂ ਜੀਵੰਤ ਲਹਿਰਾਂ ਸਰੋਤਿਆਂ ਨੂੰ ਇੱਕ ਵਿਲੱਖਣ ਊਰਜਾ ਨਾਲ ਭਰ ਦਿੰਦੀਆਂ ਹਨ।'
    Tere Kaaran Mere Saajan: 'ਇਹ ਗੀਤ ਸ਼ਰਧਾ ਦਾ ਸਿਖਰ ਹੈ, ਜਿੱਥੇ ਨਾਇਕਾ ਆਪਣੇ ਜੀਵਨ ਦੇ ਹਰ
      ਪਹਿਲੂ ਨੂੰ ਆਪਣੇ ਪ੍ਰੇਮੀ ਨੂੰ ਸਮਰਪਿਤ ਕਰਦੀ ਹੈ।


      ਲਤਾ ਜੀ ਦੀ ਕੋਮਲ ਆਵਾਜ਼ ਇਸ ਸੁਰ ਨੂੰ ਅਧਿਆਤਮਿਕ ਡੂੰਘਾਈ ਦਿੰਦੀ ਹੈ।


      ਇਹ ਪਿਆਰ ਦੇ ਪਵਿੱਤਰ ਬੰਧਨ ਨੂੰ ਦਰਸਾਉਂਦਾ ਹੈ ਜਿੱਥੇ ਦੂਰੀ ਦੇ ਬਾਵਜੂਦ ਦਿਲ ਜੁੜੇ ਰਹਿੰਦੇ
      ਹਨ।


      ਬੋਲ ਪਿਆਰੇ ਵਿੱਚ ਬੇਅੰਤ ਉਡੀਕ ਅਤੇ ਅਟੁੱਟ ਵਿਸ਼ਵਾਸ ਨੂੰ ਪ੍ਰਗਟ ਕਰਦੇ ਹਨ।'
    Falak Se Tod Ke Dekho Sitare: 'ਮੁਹੰਮਦ ਰਫ਼ੀ ਦੀ ਮਖਮਲੀ ਆਵਾਜ਼ ਇਸ ਰੋਮਾਂਟਿਕ ਗੀਤ ਨੂੰ
      ਇੱਕ ਵੱਖਰੇ ਪੱਧਰ ''ਤੇ ਉੱਚਾ ਕਰਦੀ ਹੈ।


      ਨਾਇਕ ਦਾ ਆਪਣੇ ਪਿਆਰੇ ਲਈ ਚੰਦ ਅਤੇ ਤਾਰੇ ਲਿਆਉਣ ਦਾ ਵਾਅਦਾ ਪਿਆਰ ਦੀ ਇੱਕ ਜਾਦੂਈ ਦੁਨੀਆ ਦਾ
      ਦਰਵਾਜ਼ਾ ਖੋਲ੍ਹਦਾ ਹੈ।


      ਇਹ ਇੱਕ ਮਿੱਠਾ ਸੰਵਾਦ ਹੈ ਜੋ ਸ਼ਬਦਾਂ ਨਾਲੋਂ ਭਾਵਨਾਵਾਂ ਰਾਹੀਂ ਦਿਲ ਤੱਕ ਪਹੁੰਚਦਾ ਹੈ।


      ਪਿਆਰ ਨੂੰ ਪ੍ਰਗਟ ਕਰਨ ਦਾ ਇਹ ਤਰੀਕਾ ਅੱਜ ਵੀ ਓਨਾ ਹੀ ਸ਼ਕਤੀਸ਼ਾਲੀ ਅਤੇ ਤਾਜ਼ਾ ਮਹਿਸੂਸ ਹੁੰਦਾ
      ਹੈ।'
    Palat Meri Jaan: 'ਆਸ਼ਾ ਭੋਂਸਲੇ ਦੀ ਚੰਚਲ ਗਾਇਕੀ ਇਸ ਗੀਤ ਵਿੱਚ ਇੱਕ ਵਿਲੱਖਣ ਨਸ਼ਾ ਅਤੇ ਸੁਹਜ
      ਪੈਦਾ ਕਰਦੀ ਹੈ।


      ਇਹ ਗੀਤ ਨਾਇਕਾ ਦੇ ਮਨਮੋਹਕ ਅੰਦਾਜ਼ ਅਤੇ ਨਾਇਕ ਨੂੰ ਆਕਰਸ਼ਿਤ ਕਰਨ ਦੀ ਉਸਦੀ ਯੋਗਤਾ ਨੂੰ ਸੁੰਦਰਤਾ
      ਨਾਲ ਦਰਸਾਉਂਦਾ ਹੈ।


      ਸੰਗੀਤ ਦੀ ਲੈਅ ਇੰਨੀ ਮਨਮੋਹਕ ਹੈ ਕਿ ਸੁਣਨ ਵਾਲਾ ਆਪਣੇ ਆਪ ਇਸਦੀ ਲੈਅ ਵਿੱਚ ਗੁਆਚ ਜਾਂਦਾ ਹੈ।


      ਇਹ ਕਹਾਣੀ ਵਿੱਚ ਇੱਕ ਮੋੜ ਨੂੰ ਦਰਸਾਉਂਦਾ ਹੈ ਜਿੱਥੇ ਆਕਰਸ਼ਣ ਅਤੇ ਚੰਚਲਤਾ ਆਪਣੇ ਸਿਖਰ ''ਤੇ
      ਪਹੁੰਚ ਜਾਂਦੀ ਹੈ।'
    Rang Rang Ke Phool Khile: 'ਕੁਦਰਤ ਦੇ ਸੁੰਦਰ ਦ੍ਰਿਸ਼ਾਂ ਅਤੇ ਫੁੱਲਾਂ ਦੀ ਖੁਸ਼ਬੂ ਦੇ ਵਿਚਕਾਰ
      ਸਥਿਤ, ਇਹ ਜੋੜੀ ਪਿਆਰ ਦੇ ਵਿਭਿੰਨ ਰੰਗਾਂ ਨੂੰ ਕੈਦ ਕਰਦੀ ਹੈ।


      ਰਫ਼ੀ ਸਾਹਿਬ ਅਤੇ ਲਤਾ ਜੀ ਦੀਆਂ ਆਵਾਜ਼ਾਂ ਦਾ ਮਿਸ਼ਰਣ ਇਸ ਗੀਤ ਨੂੰ ਬਸੰਤ ਦਾ ਇੱਕ ਮਿੱਠਾ ਅਹਿਸਾਸ
      ਦਿੰਦਾ ਹੈ।


      ਇਹ ਨਾਇਕ ਅਤੇ ਨਾਇਕਾ ਦੇ ਖੁਸ਼ਹਾਲ ਮਿਲਾਪ ਅਤੇ ਉਨ੍ਹਾਂ ਦੀ ਖੁਸ਼ਹਾਲ ਦੁਨੀਆਂ ਦਾ ਇੱਕ ਸੁਰੀਲਾ
      ਜਸ਼ਨ ਹੈ।


      ਗੀਤ ਦੇ ਬੋਲ ਅਤੇ ਸੁਰ ਮਨ ਵਿੱਚ ਇੱਕ ਸਕਾਰਾਤਮਕ ਅਤੇ ਸ਼ਾਂਤਮਈ ਮਾਹੌਲ ਪੈਦਾ ਕਰਦੇ ਹਨ।'
