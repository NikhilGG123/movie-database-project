  Mandarin:
    Aan Milo Sajna: '阿尼尔的故事始于一位母亲对多年前失去独子后无比思念。


      富有的寡妇萨维特里·德维被骗，误以为一个陌生人是她的亲生儿子阿尼尔。


      真正的阿尼尔（拉杰什·卡纳饰）过着简朴的生活，隐瞒着自己的身份。


      他遇到了迪帕（阿莎·帕雷克饰），迪帕的纯真和美丽赢得了阿尼尔的心。


      随着阿尼尔和迪帕感情的加深，贪婪的骗子们也逐渐设下圈套。


      阿尼尔意识到母亲的生命和名誉正受到威胁。


      一个由犯罪分子领导的诈骗团伙企图完全控制萨维特里·德维。


      阿尼尔制定了一个冒险的计划，回到母亲身边，揭穿假儿子的真面目。


      在这场真相与贪婪的较量中，迪帕成为了阿尼尔最强大的后盾。


      在重重谜团和惊险曲折的事件中，阿尼尔最终重拾了家族失去的尊严。


      自负和欺骗被战胜，破碎的家庭得以重聚。


      这段旅程告诉我们，血缘关系和真相终究无法永远隐藏。'
    Achha To Hum Chalte Hain: '恋人们之间甜蜜的玩笑和离别的痛苦，赋予了这首歌鲜活的色彩。


      夕阳西下，男女主角依依惜别，但他们的脚步却不愿停下。


      基肖尔·库马尔和拉塔·曼格什卡的歌声，将这段甜蜜的对话化作一首永恒的爱情诗篇。


      这首歌触动了每一位恋人的心弦，他们片刻也不愿与爱人分离。'
    Jawani O Diwani Tu Zindabad: '这首歌充满欢乐和无忧无虑的精神，体现了青春的活力和对生活的热爱。


      拉杰什·卡纳极具魅力的演唱风格使这首歌家喻户晓。


      它完美地诠释了男主角自由奔放的精神和活泼开朗的个性。


      动感的音乐浪潮为听众注入了独特的能量。'
    Tere Kaaran Mere Saajan: '这首歌是奉献的巅峰之作，歌中女主角将生命的一切都献给了她所爱的人。


      拉塔·曼格什卡尔柔美的嗓音为这首旋律赋予了深邃的灵性。


      它描绘了神圣的爱情纽带，即使相隔千里，心也紧紧相连。


      歌词表达了对爱人无尽的等待和坚定不移的信念。'
    Falak Se Tod Ke Dekho Sitare: '穆罕默德·拉菲醇厚的嗓音将这首浪漫歌曲提升到了另一个境界。


      男主角承诺为心爱之人摘取月亮和星星，这句誓言开启了通往爱情奇幻世界的大门。


      这是一段甜蜜的对话，它以情感而非言语直击人心。


      这种表达爱的方式，即使在今天，依然充满力量，令人耳目一新。'
    Palat Meri Jaan: '阿莎·博斯勒俏皮的歌声为这首歌增添了一种独特的魅力和令人陶醉的魔力。


      这首歌生动地描绘了女主角的妩媚风情以及她吸引男主角的魅力。


      音乐的节奏如此引人入胜，让人不由自主地沉浸其中。


      它象征着故事中的一个转折点，此时女主角的吸引力和俏皮感达到了顶峰。'
    Rang Rang Ke Phool Khile: '这首二重唱以美丽的自然风光和芬芳的花香为背景，捕捉了爱情的种种美好。


      拉菲·萨哈布和拉塔·吉的歌声交织，赋予这首歌甜美的春日气息。


      它以优美的旋律赞颂了男女主角的幸福结合以及他们美好的生活。


      歌曲的歌词和旋律营造出一种积极平和的氛围。'
