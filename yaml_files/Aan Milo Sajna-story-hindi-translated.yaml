  Tamil:
    Aan Milo Sajna: 'பல வருடங்களுக்கு முன்பு தனது ஒரே மகனை இழந்த ஒரு தாயின் ஏக்கத்துடன்
      அனிலின் கதை தொடங்குகிறது.


      சாவித்ரி தேவி என்ற பணக்கார விதவை, ஒரு அந்நியன் தான் தனது உண்மையான மகன் அனில்
      என்று நம்பும்படி ஏமாற்றப்படுகிறாள்.


      ராஜேஷ் கன்னாவாக நடிக்கும் உண்மையான அனில், தனது அடையாளத்தை மறைத்து, எளிமையான
      வாழ்க்கை வாழ்கிறார்.


      தனது எளிமை மற்றும் அழகால் அனிலின் இதயத்தை வென்ற ஆஷா பரேக் நடிக்கும் தீபாவை அவர்
      சந்திக்கிறார்.


      அனில் மற்றும் தீபாவின் உறவு ஆழமடைகையில், செல்வ வெறி பிடித்த வேட்டையாடுபவர்களின்
      வலையும் அதிகரிக்கிறது.


      தனது தாயின் உயிரும் கௌரவமும் ஆபத்தில் இருப்பதை அனில் உணர்கிறான்.


      குற்றவாளிகளால் வழிநடத்தப்படும் மோசடி கும்பல், சாவித்ரி தேவியின் முழுமையான கட்டுப்பாட்டை
      நாடுகிறது.


      தனது தாயிடம் திரும்பிச் சென்று போலி மகனை அம்பலப்படுத்த அனில் ஒரு ஆபத்தான திட்டத்தை
      வகுக்கிறார்.


      உண்மைக்கும் பேராசைக்கும் இடையிலான இந்தப் போரில், தீபா அனிலின் மிகப்பெரிய பலமாக
      வெளிப்படுகிறார்.


      தீவிரமான மர்மம் மற்றும் சிலிர்ப்பூட்டும் திருப்பங்களை கடந்து, அனில் இறுதியில்
      தனது குடும்பத்தின் இழந்த கண்ணியத்தை மீட்டெடுக்கிறார்.

      அகங்காரமும் வஞ்சகமும் தோற்கடிக்கப்படுகின்றன, உடைந்த குடும்பம் மீண்டும் இணைகிறது.

      இரத்த உறவுகளையும் உண்மையையும் நீண்ட காலம் மறைத்து வைக்க முடியாது என்பதை இந்தப்
      பயணம் நமக்குக் கற்பிக்கிறது.'
    Achha To Hum Chalte Hain: 'காதலர்களுக்கிடையேயான இனிமையான கேலிப் பேச்சும், பிரிவின்
      வேதனையும் இந்தப் பாடலுக்கு ஒரு துடிப்பான நிறத்தைத் தருகின்றன.


      சூரியன் மறையும் போது, ​​நாயகனும் நாயகியும் ஒருவருக்கொருவர் விடைபெறுகிறார்கள்,
      ஆனால் அவர்களின் அடிகள் நிற்கத் துடிக்கின்றன.


      கிஷோர் குமார் மற்றும் லதா மங்கேஷ்கரின் குரல்கள் இந்த கேலிப் பேச்சை அழியாத காதல்
      கவிதையாக மாற்றுகின்றன.


      இந்தப் பாடல், ஒரு கணம் கூட தன் துணையை விட்டுப் பிரிய விரும்பாத ஒவ்வொரு காதலனின்
      இதயத்தையும் தொடுகிறது.'
    Jawani O Diwani Tu Zindabad: 'மகிழ்ச்சியும், கவலையற்ற உணர்வும் நிறைந்த இந்தப்
      பாடல், இளமையின் உற்சாகத்தையும், வாழ்க்கையின் கொண்டாட்டத்தையும் வெளிப்படுத்துகிறது.


      ராஜேஷ் கன்னாவின் கவர்ச்சிகரமான பாணி இந்தப் பாடலை வீட்டுப் பெயராக மாற்றியது.


      இது நாயகனின் சுதந்திரமான மனப்பான்மையையும், துடிப்பான ஆளுமையையும் சரியாக வரையறுக்கிறது.


      இசையின் துடிப்பான அலைகள் கேட்போரை ஒரு தனித்துவமான ஆற்றலால் நிரப்புகின்றன.'
    Tere Kaaran Mere Saajan: 'இந்தப் பாடல் பக்தியின் உச்சம், இதில் கதாநாயகி தனது வாழ்க்கையின்
      ஒவ்வொரு அம்சத்தையும் தனது காதலிக்கு அர்ப்பணிக்கிறார்.


      லதா ஜியின் மென்மையான குரல் இந்த மெல்லிசைக்கு ஆன்மீக ஆழத்தை அளிக்கிறது.


      இது தூரத்தை மீறி இதயங்கள் இணைந்திருக்கும் அன்பின் புனிதமான பிணைப்பை சித்தரிக்கிறது.


      பாடல் வரிகள் முடிவில்லாத காத்திருப்பையும், காதலியின் மீது அசைக்க முடியாத நம்பிக்கையையும்
      வெளிப்படுத்துகின்றன.'
    Falak Se Tod Ke Dekho Sitare: 'முகமது ரஃபியின் மென்மையான குரல் இந்த காதல் பாடலை
      வேறொரு நிலைக்கு உயர்த்துகிறது.


      தனது காதலிக்காக சந்திரனையும் நட்சத்திரங்களையும் கொண்டு வருவதாக ஹீரோவின் வாக்குறுதி,
      காதல் என்ற மாயாஜால உலகத்திற்கான கதவைத் திறக்கிறது.


      வார்த்தைகளை விட உணர்ச்சிகள் மூலம் இதயத்தை அடையும் ஒரு இனிமையான உரையாடல் இது.


      காதலை வெளிப்படுத்தும் இந்த முறை இன்றும் கூட அதே சக்தி வாய்ந்ததாகவும் புத்துணர்ச்சியுடனும்
      உணர்கிறது.'
    Palat Meri Jaan: 'இந்தப் பாடலில் ஆஷா போஸ்லேவின் விளையாட்டுத்தனமான பாடல் ஒரு தனித்துவமான
      போதையையும் வசீகரத்தையும் உருவாக்குகிறது.

      இந்தப் பாடல் கதாநாயகியின் கவர்ச்சிகரமான பாணியையும், நாயகனை ஈர்க்கும் அவரது திறனையும்
      அழகாக சித்தரிக்கிறது.

      இசையின் தாளம் மிகவும் வசீகரிக்கும் வகையில் கேட்பவர் தானாகவே அதன் தாளத்தில் தொலைந்து
      போகிறார்.

      கதையின் ஒரு திருப்புமுனையை இது சித்தரிக்கிறது, அங்கு ஈர்ப்பும் விளையாட்டுத்தனமும்
      உச்சத்தை அடைகின்றன.'
    Rang Rang Ke Phool Khile: 'இயற்கையின் அழகிய காட்சிகள் மற்றும் பூக்களின் நறுமணத்தின்
      மத்தியில் அமைக்கப்பட்ட இந்த ஜோடிப் பாடல், அன்பின் பல்வேறு நிழல்களைப் படம்பிடித்து
      காட்டுகிறது.


      ரஃபி சாஹப் மற்றும் லதா ஜியின் குரல்களின் கலவை இந்தப் பாடலுக்கு ஒரு இனிமையான
      வசந்த உணர்வைத் தருகிறது.


      இது நாயகன் மற்றும் நாயகியின் மகிழ்ச்சியான சங்கமம் மற்றும் அவர்களின் மகிழ்ச்சியான
      உலகத்தின் மெல்லிசை கொண்டாட்டமாகும்.


      பாடலின் வரிகளும் மெல்லிசையும் மனதில் ஒரு நேர்மறையான மற்றும் அமைதியான சூழ்நிலையை
      உருவாக்குகின்றன.'
    songs: {}
  Gujarati:
    Aan Milo Sajna: 'અનિલની વાર્તા એક માતાની ઝંખનાથી શરૂ થાય છે જેણે વર્ષો પહેલા પોતાના
      એકમાત્ર પુત્રને ગુમાવ્યો હતો.


      એક શ્રીમંત વિધવા, સાવિત્રી દેવી, એક અજાણી વ્યક્તિ એવું માનીને છેતરાય છે કે તે
      તેનો અસલી પુત્ર, અનિલ છે.


      રાજેશ ખન્ના દ્વારા ભજવાયેલ અસલી અનિલ, એક સાદું જીવન જીવે છે, પોતાની ઓળખ છુપાવે
      છે.


      તેનો સામનો આશા પારેખ દ્વારા ભજવાયેલ દીપા સાથે થાય છે, જે પોતાની સાદગી અને સુંદરતાથી
      અનિલનું હૃદય જીતી લે છે.


      જેમ જેમ અનિલ અને દીપાનો સંબંધ ગાઢ બને છે, તેમ તેમ સંપત્તિના ભૂખ્યા શિકારીઓનું
      જાળું પણ વધે છે.


      અનિલને ખ્યાલ આવે છે કે તેની માતાનું જીવન અને સન્માન જોખમમાં છે.


      ગુનેગાર વ્યક્તિઓના નેતૃત્વમાં છેતરપિંડી કરનારાઓની એક ટોળકી, સાવિત્રી દેવી પર
      સંપૂર્ણ નિયંત્રણ મેળવવા માંગે છે.


      અનિલ તેની માતા પાસે પાછા ફરવા અને નકલી પુત્રનો પર્દાફાશ કરવા માટે એક જોખમી યોજના
      ઘડે છે.


      સત્ય અને લોભ વચ્ચેની આ લડાઈમાં, દીપા અનિલની સૌથી મોટી તાકાત તરીકે ઉભરી આવે છે.


      ગંભીર રહસ્ય અને રોમાંચક વળાંકોમાંથી પસાર થઈને, અનિલ આખરે તેના પરિવારની ખોવાયેલી
      પ્રતિષ્ઠા પાછી મેળવે છે.


      અહંકાર અને કપટનો પરાજય થાય છે, અને એક તૂટેલો પરિવાર ફરી જોડાય છે.

      આ યાત્રા આપણને શીખવે છે કે લોહીના સંબંધો અને સત્યને લાંબા સમય સુધી છુપાવી શકાતા
      નથી.'
    Achha To Hum Chalte Hain: 'પ્રેમીઓ વચ્ચેની મીઠી મજાક અને વિરહની વેદના આ ગીતને
      જીવંત રંગ આપે છે.

      સૂર્ય આથમતાં જ હીરો અને નાયિકા એકબીજાને વિદાય આપે છે, પરંતુ તેમના પગલાં રોકાવા
      માટે ઉત્સુક હોય છે.

      કિશોર કુમાર અને લતા મંગેશકરના અવાજો આ મજાકને પ્રેમની અમર કવિતામાં પરિવર્તિત
      કરે છે.

      આ ગીત દરેક પ્રેમીના હૃદયને સ્પર્શે છે જે એક ક્ષણ માટે પણ પોતાના જીવનસાથીથી દૂર
      રહેવા માંગતો નથી.'
    Jawani O Diwani Tu Zindabad: 'મજા અને બેફિકરાઈથી ભરપૂર, આ ગીત યુવાનીનો ઉલ્લાસ
      અને જીવનના ઉત્સવને વ્યક્ત કરે છે.


      રાજેશ ખન્નાની કરિશ્માઈ શૈલીએ આ ગીતને ઘર-ઘરમાં લોકપ્રિય બનાવ્યું.


      તે હીરોના મુક્ત ભાવના અને ઉત્સાહી વ્યક્તિત્વને સંપૂર્ણ રીતે વ્યાખ્યાયિત કરે
      છે.


      સંગીતના જીવંત તરંગો શ્રોતાઓને એક અનોખી ઉર્જાથી ભરી દે છે.'
    Tere Kaaran Mere Saajan: 'આ ગીત ભક્તિનું શિખર છે, જ્યાં નાયિકા પોતાના જીવનના દરેક
      પાસાને પોતાના પ્રિયતમને સમર્પિત કરે છે.


      લતાજીનો મધુર અવાજ આ સૂરને આધ્યાત્મિક ઊંડાણ આપે છે.


      તે પ્રેમના પવિત્ર બંધનનું નિરૂપણ કરે છે જ્યાં અંતર હોવા છતાં હૃદય જોડાયેલા રહે
      છે.


      આ ગીતના શબ્દો અનંત પ્રતીક્ષા અને પ્રિયતમમાં અતૂટ શ્રદ્ધા વ્યક્ત કરે છે.'
    Falak Se Tod Ke Dekho Sitare: 'મોહમ્મદ રફીનો મખમલી અવાજ આ રોમેન્ટિક ગીતને એક અલગ
      જ સ્તરે લઈ જાય છે.

      નાયકનું પોતાના પ્રિયજન માટે ચંદ્ર અને તારા લાવવાનું વચન પ્રેમની જાદુઈ દુનિયાના
      દ્વાર ખોલે છે.

      તે એક મધુર સંવાદ છે જે શબ્દો કરતાં લાગણીઓ દ્વારા હૃદય સુધી પહોંચે છે.

      પ્રેમ વ્યક્ત કરવાની આ રીત આજે પણ એટલી જ શક્તિશાળી અને તાજી લાગે છે.'
    Palat Meri Jaan: 'આશા ભોંસલેનું રમતિયાળ ગાયન આ ગીતમાં એક અનોખો માદકતા અને આકર્ષણ
      પેદા કરે છે.


      આ ગીત નાયિકાની મોહક શૈલી અને હીરોને આકર્ષવાની તેની ક્ષમતાને સુંદર રીતે દર્શાવે
      છે.


      સંગીતનો લય એટલો મનમોહક છે કે શ્રોતા આપમેળે તેના લયમાં ખોવાઈ જાય છે.


      તે વાર્તામાં એક વળાંક દર્શાવે છે જ્યાં આકર્ષણ અને રમતિયાળતા ચરમસીમાએ પહોંચે
      છે.'
    Rang Rang Ke Phool Khile: 'પ્રકૃતિના સુંદર દૃશ્યો અને ફૂલોની સુગંધ વચ્ચે સ્થિત,
      આ યુગલગીત પ્રેમના વિવિધ રંગોને આકર્ષિત કરે છે.


      રફી સાહેબ અને લતાજીના અવાજોનું મિશ્રણ આ ગીતને વસંતનો મધુર અનુભવ આપે છે.


      આ નાયક અને નાયિકાના સુખી જોડાણ અને તેમના સુખી વિશ્વનો મધુર ઉજવણી છે.


      ગીતના શબ્દો અને સૂર મનમાં સકારાત્મક અને શાંતિપૂર્ણ વાતાવરણ બનાવે છે.'
    songs: {}
  Bengali:
    Aan Milo Sajna: 'অনিলের গল্প শুরু হয় এক মায়ের প্রতি আকুলতা দিয়ে, যে বহু বছর আগে
      তার একমাত্র ছেলেকে হারিয়েছিল।


      একজন ধনী বিধবা, সাবিত্রী দেবী, প্রতারিত হয়ে বিশ্বাস করে যে একজন অপরিচিত ব্যক্তিই
      তার আসল ছেলে অনিল।


      রাজেশ খান্না অভিনীত আসল অনিল, একটি সরল জীবনযাপন করছে, তার পরিচয় গোপন করে।


      সে আশা পারেখ অভিনীত দীপার সাথে দেখা করে, যে তার সরলতা এবং সৌন্দর্য দিয়ে অনিলের
      মন জয় করে।


      অনিল এবং দীপার সম্পর্ক যত গভীর হয়, সম্পদের জন্য লোভী শিকারিদের জালও ততই গভীর
      হয়।


      অনিল বুঝতে পারে যে তার মায়ের জীবন এবং সম্মান বিপন্ন।


      অপরাধী ব্যক্তিদের নেতৃত্বে একদল প্রতারক সাবিত্রী দেবীর সম্পূর্ণ নিয়ন্ত্রণ চায়।


      অনিল তার মায়ের কাছে ফিরে যাওয়ার এবং নকল ছেলেকে ফাঁস করার জন্য একটি ঝুঁকিপূর্ণ
      পরিকল্পনা তৈরি করে।


      সত্য এবং লোভের এই যুদ্ধে, দীপা অনিলের সর্বশ্রেষ্ঠ শক্তি হিসেবে আবির্ভূত হয়।


      তীব্র রহস্য এবং রোমাঞ্চকর মোড়ের মধ্য দিয়ে, অনিল অবশেষে তার পরিবারের হারানো
      মর্যাদা পুনরুদ্ধার করে।


      অহংকার এবং ছলনা পরাজিত হয়, এবং একটি ভাঙা পরিবার পুনরায় একত্রিত হয়।

      এই যাত্রা আমাদের শিক্ষা দেয় যে রক্তের বন্ধন এবং সত্যকে বেশিদিন গোপন রাখা যায়
      না।'
    Achha To Hum Chalte Hain: 'প্রেমিক-প্রেমিকাদের মধ্যে মিষ্টি আড্ডা এবং বিচ্ছেদের
      যন্ত্রণা এই গানটিকে এক প্রাণবন্ত রঙ দিয়েছে।


      সূর্য অস্ত যাওয়ার সাথে সাথে নায়ক-নায়িকা একে অপরকে বিদায় জানায়, কিন্তু তাদের
      পদক্ষেপ থামতে মরিয়া হয়ে ওঠে।


      কিশোর কুমার এবং লতা মঙ্গেশকরের কণ্ঠস্বর এই আড্ডাকে ভালোবাসার এক অমর কবিতায়
      রূপান্তরিত করে।


      এই গানটি প্রতিটি প্রেমিক-প্রেমিকার হৃদয়ের কথা বলে, যারা এক মুহূর্তের জন্যও
      তাদের সঙ্গীর কাছ থেকে দূরে থাকতে চায় না।'
    Jawani O Diwani Tu Zindabad: 'মজা এবং চিন্তামুক্ত চেতনায় পরিপূর্ণ এই গানটি যৌবনের
      উচ্ছ্বাস এবং জীবনের উদযাপনের প্রতীক।


      রাজেশ খান্নার ক্যারিশম্যাটিক স্টাইল এই সুরটিকে ঘরে ঘরে জনপ্রিয় করে তুলেছিল।


      এটি নায়কের মুক্তমনা চেতনা এবং প্রাণবন্ত ব্যক্তিত্বকে নিখুঁতভাবে সংজ্ঞায়িত
      করে।


      সঙ্গীতের প্রাণবন্ত তরঙ্গ শ্রোতাদের এক অনন্য শক্তিতে ভরিয়ে দেয়।'
    Tere Kaaran Mere Saajan: 'এই গানটি ভক্তির শিখর, যেখানে নায়িকা তার জীবনের প্রতিটি
      দিক তার প্রিয়জনের কাছে উৎসর্গ করেছেন।


      লতাজির কোমল কণ্ঠ এই সুরে আধ্যাত্মিক গভীরতা যোগ করে।


      এটি প্রেমের পবিত্র বন্ধনকে চিত্রিত করে যেখানে দূরত্ব সত্ত্বেও হৃদয় সংযুক্ত
      থাকে।


      গানের কথাগুলি প্রিয়জনের প্রতি অসীম অপেক্ষা এবং অটল বিশ্বাস প্রকাশ করে।'
    Falak Se Tod Ke Dekho Sitare: 'মোহাম্মদ রফির মখমল কণ্ঠ এই রোমান্টিক গানটিকে এক
      ভিন্ন স্তরে উন্নীত করে।


      প্রেয়সীর জন্য চাঁদ-তারা আনার নায়কের প্রতিশ্রুতি ভালোবাসার এক জাদুকরী জগতের
      দরজা খুলে দেয়।


      এটি একটি মিষ্টি সংলাপ যা শব্দের চেয়ে আবেগের মাধ্যমে হৃদয়ে পৌঁছায়।


      ভালোবাসা প্রকাশের এই পদ্ধতি আজও একই রকম শক্তিশালী এবং সতেজ মনে হয়।'
    Palat Meri Jaan: 'আশা ভোঁসলের কৌতুকপূর্ণ গায়কী এই গানে এক অনন্য নেশা এবং আকর্ষণ
      তৈরি করে।


      এই গানে নায়িকার প্রলোভনসঙ্কুল স্টাইল এবং নায়ককে আকর্ষণ করার তার ক্ষমতা সুন্দরভাবে
      চিত্রিত করা হয়েছে।


      সংগীতটির ছন্দ এতটাই মনোমুগ্ধকর যে শ্রোতা স্বয়ংক্রিয়ভাবে এর ছন্দে হারিয়ে যায়।


      এটি গল্পের একটি মোড়কে চিত্রিত করে যেখানে আকর্ষণ এবং কৌতুকপূর্ণতা তাদের শীর্ষে
      পৌঁছে।'
    Rang Rang Ke Phool Khile: 'প্রকৃতির অপূর্ব দৃশ্য এবং ফুলের সুবাসের মাঝে অবস্থিত
      এই যুগলবন্দী প্রেমের বিভিন্ন ছায়াকে ধারণ করে।


      রফি সাহেব এবং লতা জির কণ্ঠের মিশ্রণ এই গানটিকে বসন্তের এক মিষ্টি অনুভূতি দেয়।


      এটি নায়ক-নায়িকার সুখী মিলন এবং তাদের সুখী পৃথিবীর একটি সুরেলা উদযাপন।


      গানের কথা এবং সুর মনের মধ্যে একটি ইতিবাচক এবং শান্তিপূর্ণ পরিবেশ তৈরি করে।'
    songs: {}
  Arabic:
    Aan Milo Sajna: 'تبدأ قصة أنيل بشوق أم فقدت ابنها الوحيد منذ سنوات.

      تُخدع الأرملة الثرية، سافيتري ديفي، فتظن أن غريبًا هو ابنها الحقيقي، أنيل.

      يعيش أنيل الحقيقي، الذي يؤدي دوره راجيش خانا، حياة بسيطة، متخفيًا وراء ستار
      الخداع.

      يلتقي أنيل بديبا، التي تؤدي دورها آشا باريك، فتأسر قلبه ببساطتها وجمالها.


      ومع تعمق علاقة أنيل وديبا، تتشابك خيوط شبكة من الطامعين في ثروته.

      يدرك أنيل أن حياة والدته وشرفها في خطر.

      تسعى عصابة من المحتالين، بقيادة مجرمين، إلى السيطرة الكاملة على سافيتري ديفي.

      يضع أنيل خطة محفوفة بالمخاطر للعودة إلى والدته وكشف حقيقة ابنه المزيف.


      في هذا الصراع بين الحقيقة والطمع، تبرز ديبا كأقوى سند لأنيل.


      في خضمّ أحداث غامضة ومثيرة، يُعيد أنيل في نهاية المطاف كرامة عائلته المفقودة.

      تُهزم الأنانية والخداع، وتلتئم شمل عائلة مُشتّتة.

      تُعلّمنا هذه الرحلة أن روابط الدم والحقيقة لا يُمكن إخفاؤها طويلًا.'
    Achha To Hum Chalte Hain: 'يُضفي الحوار العذب بين الحبيبين، ومعاناة الفراق، رونقًا
      خاصًا على هذه الأغنية.


      ومع غروب الشمس، يودع البطل والبطلة بعضهما، لكن خطواتهما تتوق للتوقف.

      يحوّل صوت كيشور كومار ولاتا مانغيشكار هذا الحوار إلى قصيدة حب خالدة.

      تُخاطب هذه الأغنية قلب كل عاشق لا يرغب في الابتعاد عن حبيبه ولو للحظة.'
    Jawani O Diwani Tu Zindabad: 'تفيض هذه الأغنية بروح المرح والانطلاق، وتجسد حيوية
      الشباب واحتفاء الحياة.

      بفضل أسلوب راجيش خانا الآسر، أصبحت هذه الأغنية معروفة لدى الجميع.


      إنها تعكس تمامًا روح البطل المتحررة وشخصيته المفعمة بالحيوية.

      تملأ موجات الموسيقى النابضة بالحياة المستمعين بطاقة فريدة.'
    Tere Kaaran Mere Saajan: 'هذه الأغنية هي قمة الإخلاص، حيث تُكرّس البطلة كل جوانب
      حياتها لحبيبها.


      يُضفي صوت لاتا جي الرقيق عمقًا روحانيًا على هذا اللحن.


      تُصوّر الأغنية الرابطة المقدسة للحب حيث تبقى القلوب متصلة رغم البُعد.


      وتُعبّر الكلمات عن انتظار لا ينتهي وإيمان راسخ بالحبيب.'
    Falak Se Tod Ke Dekho Sitare: 'يضفي صوت محمد رافي المخملي على هذه الأغنية الرومانسية
      رونقًا خاصًا.

      وعد البطل بجلب القمر والنجوم لحبيبته يفتح الباب أمام عالم ساحر من الحب.

      إنه حوار عذب يصل إلى القلب بالمشاعر أكثر من الكلمات.

      لا تزال هذه الطريقة في التعبير عن الحب مؤثرة ومنعشة حتى اليوم.'
    Palat Meri Jaan: 'يُضفي غناء آشا بهوسلي المرح سحراً وجاذبيةً فريدةً على هذه الأغنية.


      تُصوّر هذه الأغنية ببراعة أسلوب البطلة الجذاب وقدرتها على استمالة البطل.


      إيقاع الموسيقى آسرٌ لدرجة أن المستمع يغرق فيه تلقائياً.


      تُمثّل هذه الأغنية نقطة تحوّل في القصة، حيث يبلغ الانجذاب والمرح ذروتهما.'
    Rang Rang Ke Phool Khile: 'وسط مناظر طبيعية خلابة وعبير الزهور، تُجسّد هذه الأغنية
      الثنائية ألوان الحب المتنوعة.


      يُضفي انسجام صوتي رافي صاحب ولاتا جي على هذه الأغنية نكهة ربيعية عذبة.


      إنها احتفالٌ موسيقيٌّ رائعٌ بزواج البطل والبطلة السعيد وعالمهما المفعم بالبهجة.


      تخلق كلمات الأغنية ولحنها جواً إيجابياً وهادئاً في النفس.'
    songs: {}
  Korean:
    Aan Milo Sajna: '아닐의 이야기는 몇 년 전 외아들을 잃은 어머니에 대한 그리움으로 시작됩니다.

      부유한 과부 사비트리 데비는 낯선 남자가 자신의 친아들 아닐이라고 믿게 됩니다.

      라제시 칸나가 연기하는 진짜 아닐은 신분을 숨기고 소박한 삶을 살고 있습니다.

      그는 아샤 파레크가 연기하는 디파를 만나게 되고, 디파의 순수함과 아름다움에 매료됩니다.


      아닐과 디파의 관계가 깊어질수록, 부를 노리는 악당들의 음모도 점점 더 깊어집니다.

      아닐은 어머니의 삶과 명예가 위태로워졌음을 깨닫습니다.

      범죄자들이 이끄는 사기단은 사비트리 데비를 완전히 장악하려 합니다.

      아닐은 어머니에게 돌아가 가짜 아들의 정체를 밝히기 위한 위험한 계획을 세웁니다.


      진실과 탐욕 사이의 싸움에서 디파는 아닐에게 가장 큰 힘이 되어줍니다.


      긴장감 넘치는 미스터리와 스릴 넘치는 반전을 헤쳐나가며, 아닐은 마침내 가족의 잃어버린 명예를 되찾습니다.

      자만과 기만이 패배하고, 산산이 조각났던 가족은 다시 하나가 됩니다.

      이 여정은 혈연과 진실은 오래 숨길 수 없다는 것을 우리에게 가르쳐줍니다.'
    Achha To Hum Chalte Hain: '연인들의 달콤한 대화와 이별의 고통이 어우러져 이 노래는 생동감 넘치는 색채를 띠게 됩니다.

      해가 지면서 주인공 남녀는 서로에게 작별 인사를 건네지만, 발걸음은 멈추고 싶어 안달이 납니다.

      키쇼르 쿠마르와 라타 망게슈카르의 목소리는 이 대화를 불멸의 사랑시로 승화시킵니다.

      이 노래는 단 한순간도 연인과 떨어져 있고 싶지 않은 모든 연인의 마음을 울립니다.'
    Jawani O Diwani Tu Zindabad: '즐거움과 자유분방함으로 가득 찬 이 노래는 젊음의 활기와 삶에 대한 찬미를 담고 있습니다.

      라제시 칸나의 카리스마 넘치는 스타일 덕분에 이 곡은 누구나 아는 명곡이 되었습니다.

      이 노래는 주인공의 자유분방한 정신과 활기찬 성격을 완벽하게 표현합니다.

      생동감 넘치는 음악의 물결은 듣는 이들에게 독특한 에너지를 선사합니다.'
    Tere Kaaran Mere Saajan: '이 노래는 여주인공이 사랑하는 이에게 삶의 모든 것을 바치는, 헌신의 극치를 보여줍니다.


      라타 지의 부드러운 목소리는 이 멜로디에 영적인 깊이를 더합니다.


      이 노래는 멀리 떨어져 있어도 마음이 연결되는 신성한 사랑의 유대를 묘사합니다.


      가사는 끝없는 기다림과 사랑하는 이에 대한 흔들림 없는 믿음을 표현합니다.'
    Falak Se Tod Ke Dekho Sitare: '모하메드 라피의 부드러운 목소리는 이 로맨틱한 노래를 한 차원 더 높은 경지로 끌어올립니다.

      사랑하는 이에게 달과 별을 가져다주겠다는 주인공의 약속은 마법 같은 사랑의 세계로 가는 문을 열어줍니다.

      말보다는 감정으로 마음을 울리는 달콤한 대화입니다.

      이처럼 사랑을 표현하는 방식은 오늘날에도 여전히 강력하고 신선하게 느껴집니다.'
    Palat Meri Jaan: '아샤 보슬레의 재치 넘치는 노래는 이 노래에 독특한 매력과 황홀함을 더합니다.

      이 노래는 여주인공의 유혹적인 스타일과 남주인공을 사로잡는 능력을 아름답게 묘사합니다.

      음악의 리듬은 너무나 매혹적이어서 듣는 사람은 저절로 그 리듬에 빠져듭니다.

      이 노래는 매력과 장난기가 절정에 달하는 이야기의 전환점을 보여줍니다.'
    Rang Rang Ke Phool Khile: '아름다운 자연 풍경과 꽃향기 가득한 배경 속에서 펼쳐지는 이 듀엣곡은 사랑의 다양한 면모를
      담아냅니다.


      라피 사합과 라타 지의 목소리가 어우러져 달콤한 봄날의 정취를 선사합니다.


      이 노래는 주인공 남녀의 행복한 결합과 그들의 행복한 세상을 아름다운 선율로 노래합니다.


      가사와 멜로디는 마음속에 긍정적이고 평화로운 분위기를 자아냅니다.'
