  Russian:
    Aan Milo Sajna: 'История Анила начинается с тоски по матери, потерявшей много
      лет назад единственного сына.

      Богатая вдова, Савитри Деви, обманом вынуждена поверить, что незнакомец — её
      настоящий сын, Анил.

      Настоящий Анил, которого играет Раджеш Кханна, ведёт простую жизнь, скрывая
      свою личность.

      Он встречает Дипу, которую играет Аша Парекх, и она покоряет сердце Анила своей
      простотой и красотой.


      По мере того, как отношения Анила и Дипы углубляются, разрастается и сеть алчных
      хищников.

      Анил понимает, что жизнь и честь его матери в опасности.

      Банда мошенников, возглавляемая преступниками, стремится установить полный контроль
      над Савитри Деви.

      Анил разрабатывает рискованный план, чтобы вернуться к матери и разоблачить
      фальшивого сына.


      В этой борьбе между правдой и жадностью Дипа становится величайшей опорой Анила.


      Раскрывая запутанные тайны и захватывающие повороты сюжета, Анил в конечном
      итоге восстанавливает утраченное достоинство своей семьи.

      Эго и обман побеждены, и расколотая семья воссоединяется.

      Это путешествие учит нас тому, что кровные узы и правда не могут долго оставаться
      скрытыми.'
    Achha To Hum Chalte Hain: 'Нежные перепалки между влюбленными и муки разлуки придают
      этой песне яркий колорит.

      На закате герой и героиня прощаются друг с другом, но их шаги отчаянно стремятся
      остановиться.

      Голоса Кишора Кумара и Латы Мангешкар превращают эти перепалки в бессмертную
      поэму о любви.

      Эта песня трогает сердце каждого влюбленного, который не хочет расставаться
      со своим партнером ни на минуту.'
    Jawani O Diwani Tu Zindabad: 'Наполненная весельем и беззаботным духом, эта песня
      воплощает в себе жизнерадостность и радость жизни.

      Харизматичный стиль Раджеша Кханны сделал эту мелодию известной на весь мир.

      Она идеально отражает свободолюбивый дух и жизнерадостную личность героя.

      Яркие волны музыки наполняют слушателей неповторимой энергией.'
    Tere Kaaran Mere Saajan: 'Эта песня — вершина преданности, где героиня посвящает
      все аспекты своей жизни любимому человеку.


      Нежный голос Латы Джи придает этой мелодии духовную глубину.


      Она изображает священную связь любви, где сердца остаются соединенными, несмотря
      на расстояние.


      Текст песни выражает бесконечное ожидание и непоколебимую веру в любимого человека.'
    Falak Se Tod Ke Dekho Sitare: 'Бархатистый голос Мохаммеда Рафи поднимает эту
      романтическую песню на совершенно новый уровень.

      Обещание героя принести луну и звезды своей возлюбленной открывает дверь в волшебный
      мир любви.

      Это нежный диалог, который трогает сердце скорее через эмоции, чем через слова.

      Такой способ выражения любви звучит так же сильно и свежо и сегодня.'
    Palat Meri Jaan: 'Игривое пение Аши Бхосле создает в этой песне неповторимое опьяняющее
      и очаровательное очарование.

      Эта песня прекрасно передает соблазнительный стиль героини и ее способность
      привлекать героя.

      Ритм музыки настолько завораживает, что слушатель автоматически погружается
      в него.

      Она изображает поворотный момент в истории, когда влечение и игривость достигают
      своего пика.'
    Rang Rang Ke Phool Khile: 'На фоне прекрасных пейзажей природы и аромата цветов
      этот дуэт передает многообразие оттенков любви.


      Сочетание голосов Рафи Сахаба и Латы Джи придает песне нежное весеннее настроение.


      Это мелодичное воспевание счастливого союза героя и героини и их счастливого
      мира.


      Текст и мелодия песни создают позитивную и умиротворяющую атмосферу.'
