metadata:
  movie_name: Aan Milo Sajna
  release_date: 24 December 1970
  director: Mukul Dutt
  producer: Jagdish Kumar
  music_director: Laxmikant Pyarelal
  lyricist: Anand Bakshi
  cast:
  - Rajesh Khanna
  - Asha Parekh
  - Vinod Khanna
commentary_type: long
songs_order:
- Achha To Hum Chalte Hain
- Jawani O Diwani Tu Zindabad
- Tere Kaaran Mere Saajan
- Falak Se Tod Ke Dekho Sitare
- Palat Meri Jaan
- Rang Rang Ke Phool Khile
commentaries:
  Hindi:
    Aan Milo Sajna: 'कहानी अनिल यानी राजेश खन्ना के इर्द-गिर्द घूमती है. जो अपनी माँ
      निरूपा रॉय का इकलौता वारिस है.

      संपत्ति के लालच में अनिल का चचेरा भाई अनिल के खिलाफ साज़िश रचता है. जिससे अनिल
      को घर छोड़ना पड़ता है.

      अपनी पहचान छिपाकर अनिल एक अलग शहर पहुँचता है. जहाँ उसकी मुलाकात दीपा यानी आशा
      पारेख से होती है.

      दीपा और अनिल के बीच प्यार पनपता है. लेकिन अतीत की परछाइयाँ उनका पीछा नहीं छोड़तीं.

      अनिल को न केवल अपना प्यार पाना है. बल्कि अपनी माँ को धोखेबाजों के चंगुल से भी
      आज़ाद कराना है.

      राजेश खन्ना का रोमांटिक अंदाज़ और विनोद खन्ना की दमदार उपस्थिति फिल्म को एक बेहतरीन
      कमर्शियल ड्रामा बनाती है.'
    songs:
      Achha To Hum Chalte Hain: 'यह गीत प्रेमी जोड़े के बीच की मीठी नोक-झोंक और विदाई
        के पल को बहुत ही मासूमियत से पेश करता है.

        किशोर कुमार और लता मंगेशकर की जुगलबंदी ने इसे एक कल्ट क्लासिक बना दिया है.'
      Jawani O Diwani Tu Zindabad: 'राजेश खन्ना के सिग्नेचर स्टाइल और किशोर कुमार
        की जादुई आवाज़ ने इस गीत को युवाओं का एंथम बना दिया था.

        गीत की ताल और बोल जीवन के प्रति उत्साह और जोश को दर्शाते हैं.'
      Tere Kaaran Mere Saajan: 'यह एक विरह और समर्पण का गीत है. जहाँ नायिका अपने साजन
        के प्रति अपनी गहरी संवेदनाएं व्यक्त करती है.

        लता जी की गायकी ने इसमें एक रूहानी दर्द भर दिया है.'
      Falak Se Tod Ke Dekho Sitare: 'मोहम्मद रफ़ी की रेशमी आवाज़ इस गीत में रोमांस
        की एक नई परिभाषा गढ़ती है.

        यह नायक द्वारा अपनी प्रेमिका को मनाने और अपने अटूट प्रेम का वादा करने का एक
        बेहतरीन चित्रण है.'
  English:
    Aan Milo Sajna: 'The story revolves around Anil, played by Rajesh Khanna, who
      is the sole heir to his mother, Nirupa Roy.

      In greed for property, Anil''s cousin conspires against him, forcing him to
      leave home.

      Hiding his identity, Anil travels to a different city where he meets Deepa,
      played by Asha Parekh.

      Love blossoms between Deepa and Anil, but the shadows of the past haunt them.

      Anil not only has to find his love but also free his mother from the clutches
      of deceitful people.

      Rajesh Khanna''s romantic style and Vinod Khanna''s powerful presence make the
      film a great commercial drama.'
    songs:
      Achha To Hum Chalte Hain: 'This song innocently depicts the sweet banter and
        farewell between a couple.

        The duet between Kishore Kumar and Lata Mangeshkar has made it a cult classic.'
      Jawani O Diwani Tu Zindabad: 'Rajesh Khanna''s signature style and Kishore Kumar''s
        magical voice made this song a youth anthem.

        The song''s rhythm and lyrics reflect a zest for life and enthusiasm.'
      Tere Kaaran Mere Saajan: 'It is a song of separation and devotion, where the
        heroine expresses her deepest feelings for her beloved.

        Lata ji''s singing imbues it with a spiritual pain.'
      Falak Se Tod Ke Dekho Sitare: 'Mohammed Rafi''s silky voice redefines romance
        in this song.

        It''s a masterful portrayal of the hero wooing his beloved and promising her
        his unwavering love.'
  Marathi:
    Aan Milo Sajna: 'ही कथा अनिलभोवती फिरते, ज्याची भूमिका राजेश खन्ना यांनी केली
      आहे, जो त्यांच्या आई निरुपा रॉयचा एकमेव वारस आहे.


      मालमत्तेच्या लोभात, अनिलचा चुलत भाऊ त्याच्याविरुद्ध कट रचतो आणि त्याला घर सोडण्यास
      भाग पाडतो.


      आपली ओळख लपवून, अनिल एका वेगळ्या शहरात जातो जिथे तो आशा पारेख यांनी साकारलेल्या
      दीपाला भेटतो.


      दीपा आणि अनिलमध्ये प्रेम फुलते, परंतु भूतकाळातील सावल्या त्यांना त्रास देतात.


      अनिलला केवळ त्याचे प्रेम शोधायचे नाही तर त्याच्या आईलाही फसव्या लोकांच्या तावडीतून
      सोडवायचे आहे.


      राजेश खन्नाची रोमँटिक शैली आणि विनोद खन्नाची प्रभावी उपस्थिती या चित्रपटाला
      एक उत्तम व्यावसायिक नाटक बनवते.'
    songs:
      Achha To Hum Chalte Hain: 'हे गाणे एका जोडप्यामधील गोड गप्पा आणि निरोपाचे निरागसपणे
        चित्रण करते.

        किशोर कुमार आणि लता मंगेशकर यांच्या युगलगीताने ते एक कल्ट क्लासिक बनवले आहे.'
      Jawani O Diwani Tu Zindabad: 'राजेश खन्नाची खास शैली आणि किशोर कुमारच्या जादुई
        आवाजामुळे हे गाणे तरुणाईचे गाणे बनले.

        गाण्याची लय आणि बोल जीवनाची उत्सुकता आणि उत्साह दर्शवतात.'
      Tere Kaaran Mere Saajan: 'हे वियोग आणि भक्तीचे गाणे आहे, जिथे नायिका तिच्या
        प्रियकराबद्दलच्या तिच्या खोल भावना व्यक्त करते.

        लताजींचे गायन त्यात आध्यात्मिक वेदनेचे दर्शन घडवते.'
      Falak Se Tod Ke Dekho Sitare: 'या गाण्यात मोहम्मद रफीचा रेशमी आवाज प्रणयाची
        पुनर्परिभाषा करतो.

        हे गाणे नायक आपल्या प्रेयसीला आकर्षित करतो आणि तिला आपल्या अढळ प्रेमाचे वचन
        देतो याचे एक उत्कृष्ट चित्रण आहे.'
  Telugu:
    Aan Milo Sajna: 'ఈ కథ అనిల్ పాత్రను రాజేష్ ఖన్నా చుట్టూ తిరుగుతుంది, ఈ పాత్ర అతని
      తల్లి నిరుప రాయ్ కి ఏకైక వారసురాలు.


      ఆస్తి కోసం దురాశతో, అనిల్ బంధువు అతనిపై కుట్ర పన్ని, అతను ఇంటి నుండి వెళ్ళిపోవాలని
      బలవంతం చేస్తాడు.


      తన గుర్తింపును దాచిపెట్టి, అనిల్ వేరే నగరానికి వెళతాడు, అక్కడ అతను ఆశా పరేఖ్
      పోషించిన దీపాను కలుస్తాడు.


      దీప మరియు అనిల్ మధ్య ప్రేమ వికసిస్తుంది, కానీ గతపు నీడలు వారిని వెంటాడతాయి.


      అనిల్ తన ప్రేమను కనుగొనడమే కాకుండా తన తల్లిని మోసపూరిత వ్యక్తుల బారి నుండి విడిపించాలి.


      రాజేష్ ఖన్నా ప్రేమ శైలి మరియు వినోద్ ఖన్నా శక్తివంతమైన ఉనికి ఈ చిత్రాన్ని గొప్ప
      వాణిజ్య నాటకంగా మారుస్తాయి.'
    songs:
      Achha To Hum Chalte Hain: 'ఈ పాట ఒక జంట మధ్య మధురమైన సంభాషణ మరియు వీడ్కోలును
        అమాయకంగా చిత్రీకరిస్తుంది.

        కిషోర్ కుమార్ మరియు లతా మంగేష్కర్ ల యుగళగీతం దీనిని ఒక కల్ట్ క్లాసిక్‌గా మార్చింది.'
      Jawani O Diwani Tu Zindabad: 'రాజేష్ ఖన్నా సిగ్నేచర్ స్టైల్ మరియు కిషోర్ కుమార్
        మాయా స్వరం ఈ పాటను యువత గీతంగా మార్చాయి.

        పాటలోని లయ మరియు సాహిత్యం జీవితం మరియు ఉత్సాహాన్ని ప్రతిబింబిస్తాయి.'
      Tere Kaaran Mere Saajan: 'ఇది ఎడబాటు మరియు భక్తితో కూడిన పాట, ఇందులో హీరోయిన్
        తన ప్రియమైన వ్యక్తి పట్ల తనకున్న లోతైన భావాలను వ్యక్తపరుస్తుంది.

        లతా జీ పాడటం దానిలో ఆధ్యాత్మిక బాధను నింపుతుంది.'
      Falak Se Tod Ke Dekho Sitare: 'ఈ పాటలో మహమ్మద్ రఫీ స్వరం ప్రేమను పునర్నిర్వచించింది.

        హీరో తన ప్రియురాలిని ఆకర్షించడం మరియు ఆమెకు తన అచంచలమైన ప్రేమను వాగ్దానం చేయడం
        యొక్క అద్భుతమైన చిత్రణ ఇది.'
  Tamil:
    Aan Milo Sajna: 'இந்தக் கதை ராஜேஷ் கன்னா நடிக்கும் அனிலைச் சுற்றியே நகர்கிறது,
      இவருடைய தாயார் நிருபா ராயின் ஒரே வாரிசு இவர்.


      சொத்து மீதான பேராசையில், அனிலின் உறவினர் அவருக்கு எதிராக சதி செய்து, அவரை வீட்டை
      விட்டு வெளியேற கட்டாயப்படுத்துகிறார்.


      தனது அடையாளத்தை மறைத்து, அனில் வேறு ஒரு நகரத்திற்குச் செல்கிறார், அங்கு அவர்
      ஆஷா பரேக் நடிக்கும் தீபாவைச் சந்திக்கிறார்.


      தீபாவுக்கும் அனிலுக்கும் இடையே காதல் மலர்கிறது, ஆனால் கடந்த கால நிழல்கள் அவர்களை
      வேட்டையாடுகின்றன.


      அனில் தனது காதலைக் கண்டுபிடிப்பது மட்டுமல்லாமல், தனது தாயை ஏமாற்றும் மக்களின்
      பிடியிலிருந்து விடுவிக்க வேண்டும்.


      ராஜேஷ் கன்னாவின் காதல் பாணியும், வினோத் கன்னாவின் சக்திவாய்ந்த இருப்பும் படத்தை
      ஒரு சிறந்த வணிக நாடகமாக்குகின்றன.'
    songs:
      Achha To Hum Chalte Hain: 'இந்தப் பாடல் ஒரு ஜோடிக்கு இடையேயான இனிமையான கேலி
        மற்றும் பிரியாவிடையை அப்பாவித்தனமாக சித்தரிக்கிறது.

        கிஷோர் குமார் மற்றும் லதா மங்கேஷ்கர் ஆகியோரின் ஜோடிப் பாடல் இதைப் ஒரு பாரம்பரியப்
        பாடலாக மாற்றியுள்ளது.'
      Jawani O Diwani Tu Zindabad: 'ராஜேஷ் கன்னாவின் தனிச்சிறப்பு பாணியும், கிஷோர்
        குமாரின் மாயாஜாலக் குரலும் இந்தப் பாடலை இளைஞர்களின் கீதமாக மாற்றியது.

        பாடலின் தாளமும் வரிகளும் வாழ்க்கை மற்றும் உற்சாகத்திற்கான ஆர்வத்தை பிரதிபலிக்கின்றன.'
      Tere Kaaran Mere Saajan: 'இது பிரிவினை மற்றும் பக்தியின் ஒரு பாடல், இதில் கதாநாயகி
        தனது காதலி மீதான தனது ஆழ்ந்த உணர்வுகளை வெளிப்படுத்துகிறார்.

        லதா ஜியின் பாடல் ஒரு ஆன்மீக வலியை ஏற்படுத்துகிறது.'
      Falak Se Tod Ke Dekho Sitare: 'இந்தப் பாடலில் முகமது ரஃபியின் மென்மையான குரல்
        காதலை மறுவரையறை செய்கிறது.

        இது நாயகன் தனது காதலியை கவர்ந்து, தனது அசைக்க முடியாத காதலை அவளுக்கு உறுதியளிக்கும்
        ஒரு அற்புதமான சித்தரிப்பு.'
  Gujarati:
    Aan Milo Sajna: 'આ વાર્તા અનિલની આસપાસ ફરે છે, જે રાજેશ ખન્ના દ્વારા ભજવવામાં
      આવે છે, જે તેની માતા નિરુપા રોયના એકમાત્ર વારસદાર છે.


      મિલકતના લોભમાં, અનિલનો પિતરાઈ ભાઈ તેની વિરુદ્ધ કાવતરું ઘડે છે, તેને ઘર છોડવા
      માટે મજબૂર કરે છે.


      પોતાની ઓળખ છુપાવીને, અનિલ એક બીજા શહેરમાં જાય છે જ્યાં તે આશા પારેખ દ્વારા ભજવવામાં
      આવેલી દીપાને મળે છે.


      દીપા અને અનિલ વચ્ચે પ્રેમ ખીલે છે, પરંતુ ભૂતકાળના પડછાયા તેમને સતાવે છે.


      અનિલને ફક્ત પોતાનો પ્રેમ જ નહીં, પણ તેની માતાને પણ કપટી લોકોના ચુંગાલમાંથી મુક્ત
      કરાવવાનો હોય છે.


      રાજેશ ખન્નાની રોમેન્ટિક શૈલી અને વિનોદ ખન્નાની શક્તિશાળી હાજરી ફિલ્મને એક મહાન
      વ્યાપારી નાટક બનાવે છે.'
    songs:
      Achha To Hum Chalte Hain: 'આ ગીતમાં એક યુગલ વચ્ચેની મીઠી મજાક અને વિદાયનું નિર્દોષતાથી
        ચિત્રણ કરવામાં આવ્યું છે.

        કિશોર કુમાર અને લતા મંગેશકર વચ્ચેના યુગલગીતે તેને એક કલ્ટ ક્લાસિક બનાવ્યું
        છે.'
      Jawani O Diwani Tu Zindabad: 'રાજેશ ખન્નાની સિગ્નેચર સ્ટાઇલ અને કિશોર કુમારના
        જાદુઈ અવાજે આ ગીતને યુવા ગીત બનાવ્યું.

        ગીતની લય અને શબ્દો જીવન અને ઉત્સાહ પ્રત્યેની ઉત્સાહને પ્રતિબિંબિત કરે છે.'
      Tere Kaaran Mere Saajan: 'આ ગીત વિરહ અને ભક્તિનું ગીત છે, જ્યાં નાયિકા પોતાના
        પ્રિયજન પ્રત્યેની પોતાની ઊંડી લાગણીઓ વ્યક્ત કરે છે.

        લતાજીનું ગાયન તેને આધ્યાત્મિક પીડાથી ભરે છે.'
      Falak Se Tod Ke Dekho Sitare: 'આ ગીતમાં મોહમ્મદ રફીનો રેશમી અવાજ રોમાંસને ફરીથી
        વ્યાખ્યાયિત કરે છે.

        આ ગીતમાં હીરો પોતાની પ્રિયતમા સાથે પ્રેમમાં પડે છે અને તેને પોતાના અતૂટ પ્રેમનું
        વચન આપે છે તેનું એક ઉત્કૃષ્ટ ચિત્રણ છે.'
  Bengali:
    Aan Milo Sajna: 'গল্পটি আবর্তিত হয়েছে অনিলকে ঘিরে, যার চরিত্রে অভিনয় করেছেন
      রাজেশ খান্না, যিনি তার মা নিরূপা রায়ের একমাত্র উত্তরাধিকারী।


      সম্পত্তির লোভে, অনিলের চাচাতো ভাই তার বিরুদ্ধে ষড়যন্ত্র করে, তাকে বাড়ি ছেড়ে
      যেতে বাধ্য করে।


      পরিচয় গোপন করে, অনিল অন্য শহরে চলে যায় যেখানে সে আশা পারেখ অভিনীত দীপার সাথে
      দেখা করে।


      দীপা এবং অনিলের মধ্যে প্রেমের প্রস্ফুটিত হয়, কিন্তু অতীতের ছায়া তাদের তাড়া
      করে বেড়ায়।

      অনিলকে কেবল তার ভালোবাসা খুঁজে বের করতে হয় না, তার মাকেও প্রতারকদের খপ্পর থেকে
      মুক্ত করতে হয়।


      রাজেশ খান্নার রোমান্টিক স্টাইল এবং বিনোদ খান্নার শক্তিশালী উপস্থিতি ছবিটিকে
      একটি দুর্দান্ত বাণিজ্যিক নাটকে পরিণত করে।'
    songs:
      Achha To Hum Chalte Hain: 'এই গানটিতে এক দম্পতির মধ্যে মিষ্টি আড্ডা এবং বিদায়ের
        অনুভূতি নির্দোষভাবে ফুটে উঠেছে।

        কিশোর কুমার এবং লতা মঙ্গেশকরের যুগলবন্দী এটিকে একটি কাল্ট ক্লাসিক করে তুলেছে।'
      Jawani O Diwani Tu Zindabad: 'রাজেশ খান্নার সিগনেচার স্টাইল এবং কিশোর কুমারের
        জাদুকরী কণ্ঠ এই গানটিকে একটি যুব সঙ্গীতে পরিণত করেছে।

        গানের ছন্দ এবং কথা জীবনের প্রতি আগ্রহ এবং উৎসাহকে প্রতিফলিত করে।'
      Tere Kaaran Mere Saajan: 'এটি বিচ্ছেদ এবং ভক্তির একটি গান, যেখানে নায়িকা তার
        প্রিয়জনের প্রতি তার গভীরতম অনুভূতি প্রকাশ করেন।

        লতাজির গাওয়া গানটি আধ্যাত্মিক বেদনায় ভরে ওঠে।'
      Falak Se Tod Ke Dekho Sitare: 'এই গানে মোহাম্মদ রফির রেশমী কণ্ঠ রোমান্সকে নতুন
        করে সংজ্ঞায়িত করে।

        এতে নায়কের তার প্রেয়সীকে আকৃষ্ট করার এবং তাকে তার অটল ভালোবাসার প্রতিশ্রুতি
        দেওয়ার এক দুর্দান্ত চিত্রায়ন রয়েছে।'
  Arabic:
    Aan Milo Sajna: 'تدور أحداث الفيلم حول أنيل، الذي يؤدي دوره راجيش خانا، وهو الوريث
      الوحيد لوالدته نيروبا روي.


      بدافع الطمع في الميراث، يتآمر ابن عم أنيل ضده، مما يجبره على مغادرة المنزل.

      يخفي أنيل هويته ويسافر إلى مدينة أخرى حيث يلتقي ديبا، التي تؤدي دورها آشا باريك.

      تنشأ قصة حب بين ديبا وأنيل، لكن ظلال الماضي تطاردهما.

      لا يقتصر الأمر على عثور أنيل على حبه فحسب، بل عليه أيضًا تحرير والدته من براثن
      المخادعين.

      يُضفي أسلوب راجيش خانا الرومانسي وحضور فينود خانا القوي على الفيلم طابعًا دراميًا
      تجاريًا رائعًا.'
    songs:
      Achha To Hum Chalte Hain: 'تُصوّر هذه الأغنية ببراءةٍ المزاح اللطيف والوداع
        بين حبيبين.

        وقد جعلها الدويتو بين كيشور كومار ولاتا مانغيشكار أغنيةً خالدةً.'
      Jawani O Diwani Tu Zindabad: 'أسلوب راجيش خانا المميز وصوت كيشور كومار الساحر
        جعلا هذه الأغنية نشيدًا للشباب.


        يعكس إيقاع الأغنية وكلماتها شغفًا بالحياة وحماسًا كبيرًا.'
      Tere Kaaran Mere Saajan: 'إنها أغنية فراق وحب، تُعبّر فيها البطلة عن أعمق مشاعرها
        تجاه حبيبها.

        ويُضفي غناء لاتا جي عليها مسحةً من الألم الروحي.'
      Falak Se Tod Ke Dekho Sitare: 'يُعيد صوت محمد رافي العذب تعريف الرومانسية في
        هذه الأغنية.


        إنها تصويرٌ بارعٌ للبطل وهو يُغازل حبيبته ويعدها بحبه الأبدي.'
  Korean:
    Aan Milo Sajna: '이 영화는 어머니 니루파 로이의 유일한 상속자인 아닐(라제시 칸나 분)을 중심으로 이야기가 전개됩니다.

      재산에 대한 욕심에 눈먼 아닐의 사촌은 그를 모함하여 집을 떠나게 만듭니다.

      신분을 숨긴 아닐은 다른 도시로 가서 디파(아샤 파레크 분)를 만납니다.

      디파와 아닐 사이에 사랑이 싹트지만, 과거의 그림자가 그들을 괴롭힙니다.

      아닐은 사랑을 찾아야 할 뿐만 아니라, 어머니를 악랄한 사람들의 손아귀에서 구해내야 합니다.

      라제시 칸나의 로맨틱한 연기와 비노드 칸나의 강렬한 존재감이 어우러져 이 영화는 훌륭한 상업 드라마로 자리매김했습니다.'
    songs:
      Achha To Hum Chalte Hain: '이 노래는 연인 사이의 달콤한 농담과 이별을 순수하게 묘사합니다.

        키쇼어 쿠마르와 라타 망게슈카르의 듀엣은 이 노래를 명곡으로 만들었습니다.'
      Jawani O Diwani Tu Zindabad: '라제시 칸나 특유의 스타일과 키쇼어 쿠마르의 매혹적인 목소리가 어우러져 이 노래는
        젊은이들의 찬가가 되었습니다.

        노래의 리듬과 가사는 삶에 대한 열정과 활력을 반영합니다.'
      Tere Kaaran Mere Saajan: '이 노래는 이별과 헌신에 대한 노래로, 여주인공이 사랑하는 사람에 대한 가장 깊은 감정을
        표현합니다.

        라타 지의 노래는 이 노래에 영적인 고통을 불어넣습니다.'
      Falak Se Tod Ke Dekho Sitare: '모하메드 라피의 부드러운 목소리는 이 노래에서 로맨스의 의미를 새롭게 정의합니다.

        사랑하는 여인에게 구애하며 변함없는 사랑을 약속하는 주인공의 모습을 탁월하게 그려낸 작품입니다.'
  Russian:
    Aan Milo Sajna: 'Сюжет вращается вокруг Анила, которого играет Раджеш Кханна,
      единственного наследника своей матери, Нирупы Рой.

      В жадности к собственности двоюродный брат Анила замышляет против него заговор,
      вынуждая его покинуть дом.

      Скрывая свою личность, Анил отправляется в другой город, где встречает Дипу,
      которую играет Аша Парекх.

      Между Дипой и Анилом расцветает любовь, но тени прошлого преследуют их.

      Анилу нужно не только найти свою любовь, но и освободить свою мать из лап лживых
      людей.

      Романтический стиль Раджеша Кханны и мощное присутствие Винода Кханны делают
      фильм отличной коммерческой драмой.'
    songs:
      Achha To Hum Chalte Hain: 'Эта песня невинно изображает милые шутки и прощание
        между парой.

        Дуэт Кишора Кумара и Латы Мангешкар сделал её культовой классикой.'
      Jawani O Diwani Tu Zindabad: 'Фирменный стиль Раджеша Кханны и волшебный голос
        Кишора Кумара сделали эту песню гимном молодежи.

        Ритм и текст песни отражают жизнелюбие и энтузиазм.'
      Tere Kaaran Mere Saajan: 'Это песня о разлуке и преданности, в которой героиня
        выражает свои самые сокровенные чувства к возлюбленному.

        Пение Латы Джи наполняет её духовной болью.'
      Falak Se Tod Ke Dekho Sitare: 'Шелковистый голос Мохаммеда Рафи в этой песне
        переосмысливает понятие романтики.

        Это мастерское изображение героя, ухаживающего за своей возлюбленной и обещающего
        ей свою непоколебимую любовь.'
  French:
    Aan Milo Sajna: 'L''histoire est centrée sur Anil, interprété par Rajesh Khanna,
      unique héritier de sa mère, Nirupa Roy.


      Avide de biens, le cousin d''Anil complote contre lui et le force à quitter
      le foyer.


      Cachant son identité, Anil se rend dans une autre ville où il rencontre Deepa,
      interprétée par Asha Parekh.


      L''amour naît entre Deepa et Anil, mais les ombres du passé les hantent.


      Anil doit non seulement retrouver l''amour, mais aussi libérer sa mère des griffes
      de personnes mal intentionnées.


      Le jeu romantique de Rajesh Khanna et la présence magnétique de Vinod Khanna
      font de ce film un grand succès populaire.'
    songs:
      Achha To Hum Chalte Hain: 'Cette chanson dépeint avec innocence les doux échanges
        et les adieux d''un couple.


        Le duo interprété par Kishore Kumar et Lata Mangeshkar en a fait un classique
        culte.'
      Jawani O Diwani Tu Zindabad: 'Le style inimitable de Rajesh Khanna et la voix
        envoûtante de Kishore Kumar ont fait de cette chanson un hymne pour la jeunesse.


        Le rythme et les paroles reflètent une joie de vivre et un enthousiasme communicatifs.'
      Tere Kaaran Mere Saajan: 'C''est une chanson de séparation et de dévotion, où
        l''héroïne exprime ses sentiments les plus profonds pour son bien-aimé.


        Le chant de Lata ji lui confère une dimension spirituelle poignante.'
      Falak Se Tod Ke Dekho Sitare: 'La voix suave de Mohammed Rafi réinvente le romantisme
        dans cette chanson.


        C''est une interprétation magistrale du héros courtisant sa bien-aimée et
        lui promettant un amour éternel.'
  Punjabi:
    Aan Milo Sajna: 'ਇਹ ਕਹਾਣੀ ਅਨਿਲ ਦੇ ਆਲੇ-ਦੁਆਲੇ ਘੁੰਮਦੀ ਹੈ, ਜਿਸਦਾ ਕਿਰਦਾਰ ਰਾਜੇਸ਼ ਖੰਨਾ
      ਨੇ ਨਿਭਾਇਆ ਹੈ, ਜੋ ਆਪਣੀ ਮਾਂ ਨਿਰੂਪਾ ਰਾਏ ਦਾ ਇਕਲੌਤਾ ਵਾਰਸ ਹੈ।


      ਜਾਇਦਾਦ ਦੇ ਲਾਲਚ ਵਿੱਚ, ਅਨਿਲ ਦਾ ਚਚੇਰਾ ਭਰਾ ਉਸਦੇ ਵਿਰੁੱਧ ਸਾਜ਼ਿਸ਼ ਰਚਦਾ ਹੈ, ਉਸਨੂੰ ਘਰ
      ਛੱਡਣ ਲਈ ਮਜਬੂਰ ਕਰਦਾ ਹੈ।


      ਆਪਣੀ ਪਛਾਣ ਲੁਕਾਉਂਦੇ ਹੋਏ, ਅਨਿਲ ਇੱਕ ਵੱਖਰੇ ਸ਼ਹਿਰ ਦੀ ਯਾਤਰਾ ਕਰਦਾ ਹੈ ਜਿੱਥੇ ਉਹ ਦੀਪਾ
      ਨੂੰ ਮਿਲਦਾ ਹੈ, ਜਿਸਦੀ ਭੂਮਿਕਾ ਆਸ਼ਾ ਪਾਰੇਖ ਨੇ ਨਿਭਾਈ ਹੈ।


      ਦੀਪਾ ਅਤੇ ਅਨਿਲ ਵਿਚਕਾਰ ਪਿਆਰ ਖਿੜਦਾ ਹੈ, ਪਰ ਅਤੀਤ ਦੇ ਪਰਛਾਵੇਂ ਉਨ੍ਹਾਂ ਨੂੰ ਪਰੇਸ਼ਾਨ ਕਰਦੇ
      ਹਨ।


      ਅਨਿਲ ਨੂੰ ਨਾ ਸਿਰਫ਼ ਆਪਣਾ ਪਿਆਰ ਲੱਭਣਾ ਪੈਂਦਾ ਹੈ, ਸਗੋਂ ਆਪਣੀ ਮਾਂ ਨੂੰ ਧੋਖੇਬਾਜ਼ ਲੋਕਾਂ
      ਦੇ ਚੁੰਗਲ ਤੋਂ ਵੀ ਛੁਡਾਉਣਾ ਪੈਂਦਾ ਹੈ।


      ਰਾਜੇਸ਼ ਖੰਨਾ ਦਾ ਰੋਮਾਂਟਿਕ ਸ਼ੈਲੀ ਅਤੇ ਵਿਨੋਦ ਖੰਨਾ ਦੀ ਸ਼ਕਤੀਸ਼ਾਲੀ ਮੌਜੂਦਗੀ ਫਿਲਮ ਨੂੰ
      ਇੱਕ ਵਧੀਆ ਵਪਾਰਕ ਡਰਾਮਾ ਬਣਾਉਂਦੀ ਹੈ।'
    songs:
      Achha To Hum Chalte Hain: 'ਇਹ ਗਾਣਾ ਮਾਸੂਮੀਅਤ ਨਾਲ ਇੱਕ ਜੋੜੇ ਵਿਚਕਾਰ ਮਿੱਠੀ ਮਜ਼ਾਕ
        ਅਤੇ ਵਿਦਾਈ ਨੂੰ ਦਰਸਾਉਂਦਾ ਹੈ।

        ਕਿਸ਼ੋਰ ਕੁਮਾਰ ਅਤੇ ਲਤਾ ਮੰਗੇਸ਼ਕਰ ਦੇ ਜੋੜੇ ਨੇ ਇਸਨੂੰ ਇੱਕ ਕਲਟ ਕਲਾਸਿਕ ਬਣਾ ਦਿੱਤਾ ਹੈ।'
      Jawani O Diwani Tu Zindabad: 'ਰਾਜੇਸ਼ ਖੰਨਾ ਦੇ ਸਿਗਨੇਚਰ ਸਟਾਈਲ ਅਤੇ ਕਿਸ਼ੋਰ ਕੁਮਾਰ
        ਦੀ ਜਾਦੂਈ ਆਵਾਜ਼ ਨੇ ਇਸ ਗੀਤ ਨੂੰ ਇੱਕ ਨੌਜਵਾਨ ਗੀਤ ਬਣਾਇਆ।

        ਗਾਣੇ ਦੀ ਲੈਅ ਅਤੇ ਬੋਲ ਜ਼ਿੰਦਗੀ ਅਤੇ ਉਤਸ਼ਾਹ ਲਈ ਇੱਕ ਜੋਸ਼ ਨੂੰ ਦਰਸਾਉਂਦੇ ਹਨ।'
      Tere Kaaran Mere Saajan: 'ਇਹ ਵਿਛੋੜੇ ਅਤੇ ਸ਼ਰਧਾ ਦਾ ਗੀਤ ਹੈ, ਜਿੱਥੇ ਨਾਇਕਾ ਆਪਣੇ ਪਿਆਰੇ
        ਲਈ ਆਪਣੀਆਂ ਸਭ ਤੋਂ ਡੂੰਘੀਆਂ ਭਾਵਨਾਵਾਂ ਦਾ ਪ੍ਰਗਟਾਵਾ ਕਰਦੀ ਹੈ।

        ਲਤਾ ਜੀ ਦਾ ਗਾਇਨ ਇਸ ਨੂੰ ਅਧਿਆਤਮਿਕ ਦਰਦ ਨਾਲ ਭਰ ਦਿੰਦਾ ਹੈ।'
      Falak Se Tod Ke Dekho Sitare: 'ਮੁਹੰਮਦ ਰਫ਼ੀ ਦੀ ਰੇਸ਼ਮੀ ਆਵਾਜ਼ ਇਸ ਗੀਤ ਵਿੱਚ ਰੋਮਾਂਸ
        ਨੂੰ ਮੁੜ ਪਰਿਭਾਸ਼ਿਤ ਕਰਦੀ ਹੈ।

        ਇਹ ਨਾਇਕ ਦਾ ਆਪਣੀ ਪ੍ਰੇਮਿਕਾ ਨੂੰ ਲੁਭਾਉਣ ਅਤੇ ਉਸਨੂੰ ਆਪਣੇ ਅਟੁੱਟ ਪਿਆਰ ਦਾ ਵਾਅਦਾ ਕਰਨ
        ਦਾ ਇੱਕ ਸ਼ਾਨਦਾਰ ਚਿੱਤਰਣ ਹੈ।'
  German:
    Aan Milo Sajna: Die Geschichte dreht sich um Anil (gespielt von Rajesh Khanna),
      den Alleinerben seiner Mutter Nirupa Roy. Aus Gier nach dem Erbe intrigiert
      Anils Cousin gegen ihn und zwingt ihn, sein Zuhause zu verlassen. Unter falscher
      Identität reist Anil in eine andere Stadt, wo er Deepa (gespielt von Asha Parekh)
      kennenlernt. Zwischen Deepa und Anil entwickelt sich eine Liebesbeziehung, doch
      die Schatten der Vergangenheit lassen sie nicht los. Anil muss nicht nur seine
      Liebe finden, sondern auch seine Mutter aus den Fängen betrügerischer Menschen
      befreien. Rajesh Khannas romantischer Stil und Vinod Khannas eindrucksvolle
      Präsenz machen den Film zu einem großartigen kommerziellen Drama.
    songs:
      Achha To Hum Chalte Hain: 'Dieses Lied schildert unschuldig das liebevolle Geplänkel
        und den Abschied eines Paares.

        Das Duett von Kishore Kumar und Lata Mangeshkar hat es zu einem Kultklassiker
        gemacht.'
      Jawani O Diwani Tu Zindabad: 'Rajesh Khannas unverkennbarer Stil und Kishore
        Kumars magische Stimme machten diesen Song zur Hymne der Jugend.

        Rhythmus und Text des Liedes spiegeln Lebensfreude und Enthusiasmus wider.'
      Tere Kaaran Mere Saajan: 'Es ist ein Lied der Trennung und Hingabe, in dem die
        Heldin ihre tiefsten Gefühle für ihren Geliebten zum Ausdruck bringt.

        Lata Jis Gesang verleiht ihm einen spirituellen Schmerz.'
      Falak Se Tod Ke Dekho Sitare: 'Mohammed Rafis sanfte Stimme verleiht der Romantik
        in diesem Lied eine ganz neue Bedeutung.

        Es ist eine meisterhafte Darstellung des Helden, der um seine Geliebte wirbt
        und ihr seine unerschütterliche Liebe verspricht.'
  Mandarin:
    Aan Milo Sajna: '故事围绕着拉杰什·卡纳饰演的阿尼尔展开，他是母亲尼鲁帕·罗伊的唯一继承人。


      阿尼尔的表兄贪婪地觊觎财产，阴谋陷害他，迫使他离家出走。


      阿尼尔隐瞒身份，前往另一个城市，在那里遇到了阿莎·帕雷克饰演的迪帕。


      迪帕和阿尼尔之间萌生了爱情，但过去的阴影却如影随形。


      阿尼尔不仅要找到真爱，还要将母亲从奸诈之人的魔爪中解救出来。


      拉杰什·卡纳的浪漫演绎和维诺德·卡纳的强大气场，使这部电影成为一部优秀的商业剧情片。'
    songs:
      Achha To Hum Chalte Hain: '这首歌纯真地描绘了一对恋人之间甜蜜的玩笑和离别。


        基肖尔·库马尔和拉塔·曼格什卡的二重唱使它成为一首经典之作。'
      Jawani O Diwani Tu Zindabad: '拉杰什·卡纳标志性的风格和基肖尔·库马尔充满魔力的嗓音使这首歌成为了一首青春颂歌。


        歌曲的节奏和歌词都体现了对生活的热情和活力。'
      Tere Kaaran Mere Saajan: '这是一首关于离别与深情的歌曲，女主人公在歌中倾诉了她对爱人的最深切的情感。


        拉塔·曼格什卡尔的演唱赋予了这首歌一种令人心碎的哀伤。'
      Falak Se Tod Ke Dekho Sitare: '穆罕默德·拉菲丝滑般的嗓音在这首歌中重新定义了浪漫。


        这首歌精妙地描绘了男主角追求心爱之人并承诺给予她永恒不变的爱。'
