commentaries:
  Hindi:
    Aan Milo Sajna: |-
      अनिल की कहानी एक ऐसी माँ की प्रतीक्षा से शुरू होती है जिसका इकलौता बेटा बरसों पहले बिछड़ गया था.
      अमीर विधवा सावित्री देवी को धोखे से विश्वास दिलाया जाता है कि एक अजनबी ही उनका असली बेटा अनिल है.
      असली अनिल यानी राजेश खन्ना अपनी पहचान छिपाकर एक साधारण जीवन जी रहा है.
      उसका सामना दीपा यानी आशा पारेख से होता है. जो अपनी सादगी और सुंदरता से अनिल का दिल जीत लेती है.
      
      जैसे-जैसे अनिल और दीपा का रिश्ता गहरा होता है. वैसे-वैसे संपत्ति के भूखे शिकारियों का जाल भी बिछने लगता है.
      अनिल को अहसास होता है कि उसकी माँ की जान और सम्मान खतरे में है.
      धोखेबाजों का गिरोह. जिसका नेतृत्व अपराधी प्रवृत्ति के लोग कर रहे हैं. सावित्री देवी को पूरी तरह से नियंत्रित करना चाहता है.
      अनिल अपनी माँ के पास वापस पहुँचने और उस फर्जी बेटे का पर्दाफाश करने के लिए एक जोखिम भरी योजना बनाता है.
      
      सच्चाई और लालच के बीच इस जंग में दीपा अनिल की सबसे बड़ी ताकत बनकर उभरती है.
      गहन रहस्य और रोमांचक मोड़ों से गुज़रते हुए अनिल अंततः अपने परिवार की खोई हुई गरिमा को बहाल करता है.
      अहंकार और छल की हार होती है. और एक बिखरा हुआ परिवार फिर से एक हो जाता है.
      यह सफर हमें सिखाता है कि खून के रिश्तों और सच्चाई को ज्यादा समय तक अंधेरे में नहीं रखा जा सकता.

    "Achha To Hum Chalte Hain": |-
      प्रेमी युगल के बीच की मीठी तकरार और जुदा होने की कसमसाहट इस गीत को एक जीवंत रंग देती है.
      सूरज ढलने के साथ नायक और नायिका एक-दूसरे को विदा तो करते हैं. लेकिन उनके कदम रुक जाने को बेताब हैं.
      किशोर कुमार और लता मंगेशकर के सुरों ने इस नोक-झोंक को प्रेम की एक अमर कविता में बदल दिया है.
      यह गीत हर उस प्रेमी के दिल की आवाज़ है जो अपने साथी से एक पल भी दूर नहीं होना चाहता.

    "Jawani O Diwani Tu Zindabad": |-
      मस्ती और बेफिक्री से लबरेज यह गीत जवानी के जोश और जीवन के उत्सव का एक प्रतीक है.
      राजेश खन्ना के करिश्माई अंदाज़ ने इस धुन को हर जुबान पर चढ़ा दिया था.
      यह नायक की आज़ाद ख्याली और उसके जिंदादिल व्यक्तित्व को पूरी तरह से परिभाषित करता है.
      संगीत की तेज़ लहरें श्रोताओं को एक अलग ही ऊर्जा से भर देती हैं.

    "Tere Kaaran Mere Saajan": |-
      यह गीत समर्पण की पराकाष्ठा है. जहाँ नायिका अपने जीवन का हर रंग अपने साजन के नाम कर देती है.
      लता जी की कोमल आवाज़ इस धुन को रूहानी गहराई प्रदान करती है.
      यह प्रेम के उस पवित्र बंधन को दर्शाता है जहाँ दूरी होने के बावजूद दिल जुड़े रहते हैं.
      गीत के बोल साजन के प्रति एक अंतहीन प्रतीक्षा और अटूट विश्वास को बयां करते हैं.

    "Falak Se Tod Ke Dekho Sitare": |-
      मोहम्मद रफ़ी की मखमली आवाज़ इस रोमांटिक गीत को एक अलग ही ऊंचाई पर ले जाती है.
      नायक अपनी प्रेमिका के लिए चाँद-तारे तोड़ लाने का जो वादा करता है. वह प्रेम की जादुई दुनिया का द्वार खोल देता है.
      यह एक ऐसा मधुर संवाद है जो शब्दों से ज्यादा भावनाओं के जरिए दिल तक पहुँचता है.
      प्रेम के इजहार का यह तरीका आज भी उतना ही प्रभावशाली और नया महसूस होता है.

    "Palat Meri Jaan": |-
      आशा भोंसले की चंचल गायकी इस गीत में एक अलग ही नशा और आकर्षण पैदा करती है.
      यह गीत नायिका के मोहक अंदाज़ और नायक को अपनी ओर आकर्षित करने की कला का सुंदर चित्रण है.
      संगीत की ताल इतनी सम्मोहक है कि सुनने वाला खुद-ब-खुद इसकी लय में खो जाता है.
      यह कहानी के उस मोड़ को दर्शाता है जहाँ आकर्षण और चंचलता अपने चरम पर होती है.

    "Rang Rang Ke Phool Khile": |-
      प्रकृति के सुंदर नज़ारों और फूलों की महक के बीच यह युगल गीत प्रेम के विविध रंगों को समेटे हुए है.
      रफ़ी साहब और लता जी की आवाज़ों का संगम इस गीत को एक मधुर वसंत की तरह महसूस कराता है.
      यह नायक और नायिका के सुखद मिलन और उनकी खुशहाल दुनिया का एक सुरीला जश्न है.
      गीत के बोल और धुन मन में एक सकारात्मक और शांतिपूर्ण वातावरण का निर्माण करते हैं.